<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="记忆卡片">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#fff7fb">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>记忆卡片</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #101828;
      --muted: rgba(16, 24, 40, 0.6);
      --line: rgba(255, 255, 255, 0.56);
      --glass: rgba(255, 255, 255, 0.48);
      --glass-strong: rgba(255, 255, 255, 0.74);
      --glass-soft: rgba(255, 255, 255, 0.3);
      --accent: #ff4d8d;
      --accent-strong: #7c3aed;
      --accent-soft: rgba(255, 77, 141, 0.16);
      --blue: #00a8ff;
      --rose: #ff5d6c;
      --gold: #ffd23f;
      --lime: #7cff6b;
      --aqua: #16f4d0;
      --shadow: 0 26px 90px rgba(35, 47, 72, 0.18);
      --inner-light: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      --radius: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 16%, rgba(255, 77, 141, 0.34), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(255, 210, 63, 0.5), transparent 24%),
        radial-gradient(circle at 72% 88%, rgba(0, 168, 255, 0.42), transparent 34%),
        radial-gradient(circle at 24% 82%, rgba(22, 244, 208, 0.34), transparent 27%),
        linear-gradient(135deg, #fff7fb 0%, #f4fbff 42%, #fffbea 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.08)),
        radial-gradient(circle at 50% 0, rgba(255, 255, 255, 0.46), transparent 38%);
      backdrop-filter: blur(2px);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      min-height: 100dvh;
      padding: max(14px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      position: relative;
    }

    .sidebar {
      position: fixed;
      top: 18px;
      bottom: 18px;
      left: 18px;
      z-index: 32;
      width: min(326px, calc(100vw - 36px));
      transform: translateX(calc(-100% - 30px));
      transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: calc(100dvh - 36px);
      padding: max(22px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.3));
      backdrop-filter: blur(34px) saturate(1.55);
      box-shadow: var(--shadow), var(--inner-light);
    }

    body.drawer-left .sidebar {
      transform: translateX(0);
    }

    .brand {
      display: grid;
      gap: 6px;
      padding: 4px 8px 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 52px;
      gap: 10px;
    }

    .input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--ink);
      outline: 0;
      box-shadow: var(--inner-light);
      backdrop-filter: blur(20px) saturate(1.3);
    }

    .input {
      height: 52px;
      padding: 0 16px;
    }

    select {
      min-height: 48px;
      padding: 0 14px;
    }

    .input:focus,
    textarea:focus {
      border-color: rgba(15, 118, 110, 0.7);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }

    .icon-btn,
    .btn {
      min-height: 44px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.64);
      box-shadow: 0 10px 28px rgba(35, 47, 72, 0.08), var(--inner-light);
      backdrop-filter: blur(22px) saturate(1.35);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn {
      width: 52px;
      min-height: 52px;
      font-size: 25px;
      line-height: 1;
    }

    .btn {
      min-height: 50px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 760;
    }

    .btn.primary,
    .icon-btn.primary {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.38);
      background: linear-gradient(135deg, #ff4d8d 0%, #7c3aed 52%, #00a8ff 100%);
      box-shadow: 0 16px 34px rgba(124, 58, 237, 0.24), var(--inner-light);
    }

    .btn.warn {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.38);
      background: linear-gradient(135deg, #ff5d6c, #ff8a00);
    }

    .btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 16px 38px rgba(35, 47, 72, 0.12), var(--inner-light);
    }

    .groups {
      display: grid;
      gap: 10px;
      overflow: auto;
      padding-right: 2px;
    }

    .group {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 62px;
      padding: 12px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.54);
      box-shadow: var(--inner-light);
      text-align: left;
    }

    .group.active {
      background: linear-gradient(140deg, rgba(255, 255, 255, 0.78), rgba(220, 249, 245, 0.58));
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 34px rgba(8, 116, 111, 0.12), var(--inner-light);
    }

    .group-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .group-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .chapter-badge {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      margin-top: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.48);
      color: rgba(16, 24, 40, 0.56);
      font-size: 11px;
      font-weight: 820;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .side-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: auto;
    }

    main {
      min-width: 0;
      padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      padding: 8px 4px;
    }

    .deck-title {
      min-width: 0;
    }

    .deck-title h2 {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 27px;
      letter-spacing: 0;
    }

    .deck-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .chapter-select {
      min-height: 46px;
      max-width: 190px;
      padding: 0 12px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      background: rgba(255, 255, 255, 0.46);
      color: var(--ink);
      box-shadow: var(--inner-light);
      font-weight: 850;
      outline: none;
      backdrop-filter: blur(16px) saturate(1.2);
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .study {
      display: grid;
      gap: 16px;
    }

    .concept-map {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      min-height: 240px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0.32)),
        radial-gradient(circle at 16% 12%, rgba(255, 77, 141, 0.14), transparent 28%),
        radial-gradient(circle at 88% 92%, rgba(0, 168, 255, 0.15), transparent 32%);
      box-shadow: 0 18px 48px rgba(35, 47, 72, 0.1), var(--inner-light);
      backdrop-filter: blur(28px) saturate(1.35);
    }

    .map-resizer {
      display: none;
      position: absolute;
      top: 26px;
      right: -9px;
      bottom: 26px;
      width: 18px;
      z-index: 8;
      cursor: col-resize;
      touch-action: none;
    }

    .map-resizer::before {
      content: "";
      position: absolute;
      top: 50%;
      right: 6px;
      width: 4px;
      height: 76px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 77, 141, 0.44), rgba(124, 58, 237, 0.38), rgba(0, 168, 255, 0.42));
      box-shadow: 0 10px 28px rgba(35, 47, 72, 0.12), var(--inner-light);
      transform: translateY(-50%);
      opacity: 0.48;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .map-resizer:hover::before,
    .map-resizer:active::before {
      opacity: 0.9;
      transform: translateY(-50%) scaleX(1.25);
    }

    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      min-height: 32px;
    }

    .map-head strong {
      font-size: 15px;
      font-weight: 900;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .map-head span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .map-root {
      display: none;
    }

    .map-branches {
      position: relative;
      display: grid;
      gap: 9px;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      padding: 0;
      -webkit-overflow-scrolling: touch;
    }

    .map-level {
      position: relative;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      min-height: 58px;
      padding: 9px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.48);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.44), rgba(255, 255, 255, 0.22)),
        linear-gradient(90deg, rgba(255, 77, 141, 0.08), rgba(22, 244, 208, 0.08));
      box-shadow: var(--inner-light);
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .map-level::before {
      content: "";
      position: absolute;
      left: 33px;
      top: -10px;
      width: 2px;
      height: 12px;
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.24);
    }

    .map-level:first-child::before {
      display: none;
    }

    .map-level.drag-over {
      transform: translateX(2px);
      border-color: rgba(124, 58, 237, 0.42);
      background: linear-gradient(135deg, rgba(255, 77, 141, 0.14), rgba(22, 244, 208, 0.16), rgba(255, 255, 255, 0.42));
    }

    .map-level-title {
      display: grid;
      gap: 2px;
      justify-items: center;
      color: rgba(16, 24, 40, 0.56);
      font-size: 12px;
      font-weight: 920;
    }

    .map-level-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--aqua));
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.48);
    }

    .map-level-title span {
      color: rgba(16, 24, 40, 0.42);
      font-size: 11px;
    }

    .map-level-nodes {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-width: 0;
    }

    .map-item {
      position: relative;
      min-width: 0;
    }

    .map-node {
      display: inline-grid;
      grid-template-columns: auto minmax(0, auto);
      gap: 6px;
      align-items: center;
      max-width: 118px;
      min-height: 32px;
      padding: 6px 9px;
      border-radius: 999px;
      color: rgba(16, 24, 40, 0.72);
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--inner-light);
      text-align: left;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .map-node[draggable="true"] {
      cursor: grab;
      touch-action: none;
    }

    .map-node.dragging {
      opacity: 0.56;
      transform: scale(0.98);
    }

    .map-node b {
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      color: rgba(16, 24, 40, 0.58);
      font-size: 10px;
      font-weight: 900;
    }

    .map-node span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 850;
    }

    .map-node .map-count {
      display: none;
    }

    .map-node.active {
      transform: translateY(-1px) scale(1.05);
      color: var(--ink);
      background: linear-gradient(135deg, rgba(255, 77, 141, 0.3), rgba(22, 244, 208, 0.28), rgba(255, 255, 255, 0.74));
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 28px rgba(0, 168, 255, 0.18), 0 0 0 4px rgba(255, 77, 141, 0.14), var(--inner-light);
    }

    .map-node.active b {
      color: #fff;
      background: linear-gradient(135deg, #ff4d8d, #7c3aed);
    }

    .map-children {
      display: none;
    }

    .map-child {
      position: relative;
      min-height: 30px;
      padding: 7px 9px;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.48);
      color: rgba(16, 24, 40, 0.7);
      font-size: 12px;
      font-weight: 820;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      box-shadow: var(--inner-light);
    }

    .map-child::before {
      content: "";
      position: absolute;
      left: -13px;
      top: 50%;
      width: 12px;
      height: 2px;
      background: rgba(22, 244, 208, 0.42);
    }

    .map-canvas {
      position: relative;
      min-height: 0;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.42), transparent 20%),
        radial-gradient(circle at 50% 50%, rgba(22, 244, 208, 0.12), transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.09), transparent 48%),
        radial-gradient(circle at 50% 50%, rgba(0, 168, 255, 0.11), transparent 64%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.18));
      box-shadow: var(--inner-light);
      touch-action: none;
      cursor: grab;
    }

    .map-canvas::after {
      content: "";
      position: absolute;
      inset: 8%;
      border-radius: 999px;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.32) 0 8%, transparent 9%),
        radial-gradient(circle, transparent 0 37%, rgba(255, 255, 255, 0.24) 38%, transparent 39%),
        radial-gradient(circle, transparent 0 61%, rgba(255, 255, 255, 0.2) 62%, transparent 63%);
      filter: blur(0.2px);
      opacity: 0.7;
      animation: graphBreath 6.5s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .map-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(16, 24, 40, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 24, 40, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      mask: radial-gradient(circle at 50% 50%, #000 0 62%, transparent 77%);
      pointer-events: none;
    }

    .map-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .map-lines path,
    .map-lines line {
      fill: none;
      stroke: rgba(72, 86, 112, 0.24);
      stroke-width: 0.86;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .map-lines path.active,
    .map-lines line.active {
      stroke: rgba(93, 95, 239, 0.5);
      stroke-width: 1.12;
      animation: edgeGlow 2.8s ease-in-out infinite;
    }

    @keyframes edgeGlow {
      0%, 100% { opacity: 0.58; }
      50% { opacity: 0.92; }
    }

    @keyframes graphBreath {
      from { transform: scale(0.975) rotate(-0.5deg); opacity: 0.52; }
      to { transform: scale(1.025) rotate(0.5deg); opacity: 0.82; }
    }

    .map-node.graph-node {
      position: absolute;
      z-index: 2;
      transform: translate(-50%, -50%);
      max-width: 112px;
      min-height: 34px;
      grid-template-columns: minmax(0, auto);
      justify-content: center;
      cursor: grab;
      touch-action: none;
      padding: 7px 11px;
      background:
        radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.98), rgba(255, 255, 255, 0.42) 34%, rgba(22, 244, 208, 0.18)),
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(235, 244, 255, 0.34));
      border-color: rgba(255, 255, 255, 0.84);
      box-shadow: 0 12px 24px rgba(35, 47, 72, 0.08), inset 0 1px 4px rgba(255, 255, 255, 0.9), inset -8px -8px 18px rgba(0, 168, 255, 0.08);
      transition: transform 0.28s cubic-bezier(0.18, 1.22, 0.28, 1), opacity 0.2s ease, filter 0.2s ease;
    }

    .map-node.graph-node.converge {
      animation: nodeReveal 0.22s ease-out both;
    }

    @keyframes nodeReveal {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.76);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .map-node.graph-node b,
    .map-node.graph-node .map-count {
      display: none;
    }

    .map-node.graph-node.active {
      transform: translate(-50%, -50%) scale(1.18);
      max-width: 152px;
      min-height: 46px;
      padding: 10px 16px;
      font-size: 15px;
      z-index: 4;
      animation: activeNodePop 0.34s cubic-bezier(0.12, 1.42, 0.26, 1) both, activeNodePulse 3.2s ease-in-out 0.36s infinite;
    }

    .map-node.graph-node.active::after {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: 999px;
      border: 1px solid rgba(124, 58, 237, 0.28);
      animation: focusRipple 0.7s ease-out both;
      pointer-events: none;
    }

    .map-node.graph-node.linked-focus {
      filter: saturate(1.18);
      animation: linkedFocusPop 0.26s cubic-bezier(0.12, 1.38, 0.26, 1) both;
    }

    @keyframes linkedFocusPop {
      0% { opacity: 0.28; transform: translate(-50%, -50%) scale(0.78); }
      68% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes activeNodePop {
      0% { opacity: 0.2; transform: translate(-50%, -50%) scale(0.86); }
      70% { opacity: 1; transform: translate(-50%, -50%) scale(1.26); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1.18); }
    }

    @keyframes activeNodePulse {
      0%, 100% { box-shadow: 0 14px 28px rgba(0, 168, 255, 0.18), 0 0 0 4px rgba(255, 77, 141, 0.14), var(--inner-light); }
      50% { box-shadow: 0 18px 38px rgba(0, 168, 255, 0.24), 0 0 0 8px rgba(124, 58, 237, 0.1), var(--inner-light); }
    }

    @keyframes focusRipple {
      from { opacity: 0.78; transform: scale(0.72); }
      to { opacity: 0; transform: scale(1.42); }
    }

    .graph-dot {
      position: absolute;
      z-index: 1;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.96), rgba(220, 230, 255, 0.54) 42%, rgba(124, 58, 237, 0.24));
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.34), 0 7px 16px rgba(35, 47, 72, 0.08);
      pointer-events: none;
      animation: dotFloat 5.5s ease-in-out infinite alternate;
    }

    .graph-dot.linked {
      width: 7px;
      height: 7px;
      background: radial-gradient(circle at 28% 22%, #fff, rgba(222, 243, 255, 0.82) 38%, rgba(124, 58, 237, 0.36));
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.36), 0 0 20px rgba(0, 168, 255, 0.18);
    }

    @keyframes dotFloat {
      from { transform: translate(-50%, -50%) translate3d(-2px, 1px, 0) scale(0.92); opacity: 0.52; }
      to { transform: translate(-50%, -50%) translate3d(2px, -2px, 0) scale(1.08); opacity: 0.86; }
    }

    .map-empty {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }

    .chapter-hub {
      display: grid;
      align-content: center;
      gap: 16px;
      min-height: min(68dvh, 700px);
      padding: clamp(20px, 4vw, 42px);
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.38)),
        radial-gradient(circle at 18% 20%, rgba(255, 77, 141, 0.14), transparent 30%),
        radial-gradient(circle at 82% 84%, rgba(0, 168, 255, 0.16), transparent 32%);
      box-shadow: var(--shadow), var(--inner-light);
      backdrop-filter: blur(30px) saturate(1.35);
    }

    .chapter-hub-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
    }

    .chapter-hub-head h3 {
      margin: 0;
      font-size: clamp(24px, 3vw, 42px);
      letter-spacing: 0;
    }

    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .chapter-card {
      display: grid;
      gap: 10px;
      min-height: 132px;
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      background:
        radial-gradient(circle at 24% 18%, rgba(255, 255, 255, 0.92), transparent 34%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.58), rgba(226, 250, 246, 0.34));
      box-shadow: 0 14px 30px rgba(35, 47, 72, 0.1), var(--inner-light);
      text-align: left;
      cursor: pointer;
    }

    .chapter-card strong {
      font-size: 18px;
      font-weight: 920;
    }

    .chapter-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 780;
    }

    .chapter-card .mini-actions {
      justify-content: start;
    }

    .card-wrap {
      perspective: 1400px;
      min-height: min(68dvh, 700px);
    }

    .card {
      position: relative;
      width: 100%;
      min-height: min(68dvh, 700px);
      transform-style: preserve-3d;
      transition: transform 0.42s cubic-bezier(0.2, 0.78, 0.24, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 54px);
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.42)),
        radial-gradient(circle at 16% 12%, rgba(255, 255, 255, 0.78), transparent 28%),
        radial-gradient(circle at 84% 88%, rgba(255, 77, 141, 0.13), transparent 32%),
        radial-gradient(circle at 18% 86%, rgba(22, 244, 208, 0.16), transparent 30%);
      box-shadow: var(--shadow), var(--inner-light), inset 0 -18px 42px rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(34px) saturate(1.45);
      backface-visibility: hidden;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .face::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent 35%, rgba(255, 255, 255, 0.24));
      mask: linear-gradient(#000, transparent 42%);
    }

    .face.back {
      transform: rotateY(180deg);
      align-items: stretch;
      justify-content: flex-start;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(226, 250, 246, 0.52)),
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.8), transparent 28%),
        radial-gradient(circle at 82% 84%, rgba(124, 58, 237, 0.16), transparent 32%),
        radial-gradient(circle at 20% 88%, rgba(255, 210, 63, 0.2), transparent 30%);
    }

    .card-text {
      width: 100%;
      max-width: 960px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      text-align: center;
      font-size: clamp(26px, 3.6vw, 52px);
      line-height: 1.35;
      font-weight: 760;
      letter-spacing: 0;
      position: relative;
      z-index: 1;
    }

    .card-links {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: min(54%, 360px);
    }

    .link-chip {
      min-height: 30px;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.64);
      color: rgba(16, 24, 40, 0.68);
      box-shadow: var(--inner-light);
      font-size: 12px;
      font-weight: 900;
      backdrop-filter: blur(18px) saturate(1.2);
    }

    .link-chip.add {
      color: #fff;
      background: linear-gradient(135deg, rgba(255, 77, 141, 0.88), rgba(124, 58, 237, 0.88), rgba(0, 168, 255, 0.88));
    }

    .link-editor {
      flex-basis: 100%;
      display: grid;
      gap: 8px;
      min-width: min(320px, 80vw);
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 16px 34px rgba(35, 47, 72, 0.14), var(--inner-light);
      backdrop-filter: blur(22px) saturate(1.25);
    }

    .link-editor input {
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(16, 24, 40, 0.1);
      background: rgba(255, 255, 255, 0.68);
      outline: none;
      font-size: 13px;
      font-weight: 760;
    }

    .link-list,
    .link-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .link-empty {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .link-list .link-chip {
      padding-right: 7px;
    }

    .link-suggestions .link-chip {
      background: rgba(247, 250, 255, 0.72);
    }

    .link-list button,
    .link-suggestions button {
      cursor: pointer;
    }

    .answer .card-text {
      max-width: 1080px;
      text-align: left;
      font-size: clamp(18px, 1.9vw, 28px);
      font-weight: 680;
      line-height: 1.58;
    }

    .back-layout {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1080px;
      margin: auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.88fr);
      gap: 16px;
      text-align: left;
    }

    .back-section {
      min-width: 0;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: var(--inner-light);
      backdrop-filter: blur(18px) saturate(1.22);
    }

    .back-section.summary {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(255, 77, 141, 0.14), rgba(22, 244, 208, 0.16), rgba(255, 255, 255, 0.54));
    }

    .back-section.case,
    .back-section.link {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(255, 210, 63, 0.18), rgba(255, 255, 255, 0.5), rgba(0, 168, 255, 0.12));
    }

    .back-layout.count-1 {
      grid-template-columns: 1fr;
    }

    .back-layout.count-3 .back-section:last-child {
      grid-column: 1 / -1;
    }

    .back-label {
      display: block;
      margin-bottom: 7px;
      color: rgba(16, 24, 40, 0.56);
      font-size: 13px;
      font-weight: 900;
    }

    .back-content {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: rgba(16, 24, 40, 0.88);
      font-size: clamp(17px, 1.65vw, 25px);
      line-height: 1.58;
      font-weight: 680;
    }

    .back-section.summary .back-content {
      font-size: clamp(21px, 2.2vw, 32px);
      line-height: 1.42;
      font-weight: 820;
    }

    .back-section.map .back-content {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", "Microsoft YaHei UI", monospace;
      font-size: clamp(16px, 1.5vw, 22px);
      line-height: 1.55;
    }

    .back-fallback {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 980px;
      margin: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      text-align: left;
      font-size: clamp(18px, 1.9vw, 28px);
      line-height: 1.58;
      font-weight: 680;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: min(68dvh, 700px);
      padding: 32px;
      border: 1px dashed rgba(255, 255, 255, 0.74);
      border-radius: 34px;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(28px) saturate(1.4);
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }

    .controls {
      display: grid;
      grid-template-columns: 60px 1fr 60px;
      gap: 12px;
      align-items: center;
    }

    .flip-btn {
      min-height: 60px;
      font-size: 17px;
    }

    .progress {
      display: grid;
      gap: 8px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .meter {
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.46);
      overflow: hidden;
      box-shadow: var(--inner-light);
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--gold), var(--aqua), var(--blue));
    }

    .motivation {
      min-height: 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(72px, 0.24fr);
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.58);
      color: rgba(16, 24, 40, 0.72);
      font-size: 14px;
      font-weight: 820;
      text-align: center;
      box-shadow: var(--inner-light);
      backdrop-filter: blur(18px) saturate(1.3);
    }

    .motivation.locked {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(232, 255, 247, 0.5)),
        linear-gradient(90deg, rgba(255, 77, 141, 0.16), rgba(0, 168, 255, 0.14));
    }

    .timer-text {
      color: rgba(16, 24, 40, 0.68);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      text-align: right;
    }

    .timer-track {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.72);
      grid-column: 1 / -1;
    }

    .timer-fill {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--lime), var(--gold), var(--accent));
      transition: width 0.2s linear;
    }

    .setting-row {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 10px;
      align-items: end;
    }

    .panel {
      position: fixed;
      top: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 32;
      width: min(380px, calc(100vw - 36px));
      overflow: auto;
      transform: translateX(calc(100% + 30px));
      transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.32));
      backdrop-filter: blur(34px) saturate(1.55);
      box-shadow: var(--shadow), var(--inner-light);
    }

    body.drawer-right .panel {
      transform: translateX(0);
    }

    .drawer-scrim {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(16, 24, 40, 0.18);
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(3px);
      transition: opacity 0.22s ease;
    }

    body.drawer-left .drawer-scrim,
    body.drawer-right .drawer-scrim {
      opacity: 1;
      pointer-events: auto;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.56);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.34);
      box-shadow: var(--inner-light);
    }

    .tab {
      min-height: 44px;
      border-radius: 14px;
      color: var(--muted);
      background: transparent;
      font-size: 13px;
      font-weight: 800;
    }

    .tab.active {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 10px 24px rgba(35, 47, 72, 0.08), var(--inner-light);
    }

    .pane {
      display: none;
      gap: 10px;
    }

    .pane.active {
      display: grid;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      padding: 14px;
      line-height: 1.55;
    }

    .prompt-editor {
      min-height: 230px;
      font-size: 13px;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .card-list {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
      padding-right: 2px;
    }

    .mini-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.42);
      box-shadow: var(--inner-light);
    }

    .mini-card strong,
    .mini-card span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mini-card strong {
      font-size: 13px;
    }

    .mini-card span {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .mini-actions {
      display: flex;
      gap: 4px;
      align-items: start;
    }

    .mini-actions button {
      width: 32px;
      min-height: 32px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.62);
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 20;
      transform: translate(-50%, 12px);
      opacity: 0;
      pointer-events: none;
      padding: 11px 14px;
      max-width: calc(100vw - 32px);
      border-radius: var(--radius);
      background: rgba(24, 32, 43, 0.92);
      color: #fff;
      font-size: 14px;
      box-shadow: 0 16px 40px rgba(24, 32, 43, 0.2);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .cover {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      background:
        linear-gradient(135deg, rgba(238, 251, 249, 0.72), rgba(255, 246, 235, 0.42)),
        #f7fbfb;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s ease;
    }

    .cover.show {
      opacity: 1;
      pointer-events: auto;
    }

    .cover-shell {
      position: relative;
      width: min(100%, 980px);
      min-height: min(86svh, 760px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.68);
      border-radius: 38px;
      background: rgba(255, 255, 255, 0.45);
      box-shadow: 0 34px 120px rgba(35, 47, 72, 0.24), var(--inner-light);
      backdrop-filter: blur(36px) saturate(1.48);
    }

    .cover-art {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(247, 251, 251, 0.78) 68%, rgba(247, 251, 251, 0.95)),
        url("liquid-metal-cover.png") center / cover no-repeat;
      transform: scale(1.01);
    }

    .cover-content {
      position: absolute;
      inset: auto 0 0 0;
      display: grid;
      gap: 16px;
      padding: clamp(26px, 5vw, 58px);
    }

    .cover-kicker {
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.52);
      color: rgba(16, 24, 40, 0.72);
      font-size: 13px;
      font-weight: 820;
      box-shadow: var(--inner-light);
      backdrop-filter: blur(18px) saturate(1.4);
    }

    .cover h2 {
      margin: 0;
      max-width: 760px;
      color: #0b1723;
      font-size: clamp(46px, 8vw, 92px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .cover p {
      margin: 0;
      max-width: 560px;
      color: rgba(16, 24, 40, 0.68);
      font-size: clamp(15px, 2vw, 19px);
      line-height: 1.7;
    }

    .cover-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .cover-actions .btn {
      min-height: 58px;
      padding: 0 22px;
      font-size: 15px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 12px;
      }

      main {
        order: 1;
      }

      .sidebar {
        order: initial;
        position: fixed;
        top: 12px;
        bottom: 12px;
        left: 12px;
        display: grid;
        grid-template-columns: minmax(160px, 1fr) minmax(220px, 2fr);
        align-items: start;
        min-height: 0;
        padding: max(14px, env(safe-area-inset-top)) 14px 14px;
      }

      .toolbar,
      .side-actions {
        grid-column: 1 / -1;
      }

      .groups {
        grid-auto-flow: column;
        grid-auto-columns: minmax(178px, 1fr);
        overflow-x: auto;
      }

      .stage {
        grid-template-columns: 1fr;
      }

      .concept-map {
        padding: 14px;
      }

      .map-branches {
        grid-auto-flow: column;
        grid-auto-columns: minmax(168px, 230px);
        overflow-x: auto;
        overflow-y: hidden;
        max-height: none;
        padding: 4px 2px 6px;
      }

      .map-child::before {
        display: none;
      }

      .map-item {
        align-content: start;
      }

      .map-children {
        margin-left: 14px;
      }

      .panel {
        max-width: none;
      }
    }

    @media (min-width: 1080px) {
      .stage {
        grid-template-columns: minmax(260px, var(--map-width, 340px)) minmax(0, 1fr);
        align-items: start;
      }

      .concept-map {
        grid-column: 1;
        grid-row: 1;
        position: sticky;
        top: max(18px, env(safe-area-inset-top));
        min-height: calc(100dvh - 52px);
        max-height: calc(100dvh - 52px);
        overflow: hidden;
      }

      .study {
        grid-column: 2;
        grid-row: 1;
      }

      .map-resizer {
        display: block;
      }
    }

    @media (max-width: 640px) {
      .sidebar {
        grid-template-columns: 1fr;
        border-radius: 24px;
      }

      main {
        padding: 4px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
        margin-bottom: 10px;
      }

      .top-actions {
        justify-content: stretch;
      }

      .top-actions .btn {
        flex: 1;
      }

      .card-wrap,
      .card,
      .empty {
        min-height: 56svh;
      }

      .card-text {
        font-size: clamp(24px, 8vw, 38px);
      }

      .back-layout {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .back-section {
        padding: 13px;
        border-radius: 18px;
      }

      .back-section.summary .back-content {
        font-size: clamp(19px, 5vw, 26px);
      }

      .back-content,
      .back-section.map .back-content,
      .back-fallback {
        font-size: clamp(16px, 4.2vw, 21px);
      }

      .face,
      .empty {
        border-radius: 26px;
        padding: 24px;
      }

      .face::before {
        border-radius: 25px;
      }

      .panel {
        border-radius: 24px;
        padding: 12px;
      }

      .brand p,
      .deck-title p,
      .hint {
        font-size: 12px;
      }

      .cover-shell {
        min-height: calc(100dvh - 36px);
        border-radius: 30px;
      }

      .cover-content {
        padding: 28px;
      }

      .cover-actions .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <section class="cover" id="cover" aria-label="液态金属封面">
    <div class="cover-shell">
      <div class="cover-art" aria-hidden="true"></div>
      <div class="cover-content">
        <div class="cover-kicker">Liquid Metal Memory Deck</div>
        <h2>记忆卡片</h2>
        <p>把资料交给 GPT 生成卡片，在 iPad 上用空格或触控翻面。简洁、专注、像一张可以流动的金属卡片。</p>
        <div class="cover-actions">
          <button class="btn primary" id="startStudy">开始背卡</button>
          <button class="btn" id="skipCover">进入编辑</button>
        </div>
      </div>
    </div>
  </section>

  <div class="drawer-scrim" id="drawerScrim"></div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>记忆卡片</h1>
        <p>空格翻面，左右切换。iPad 外接键盘和触控都能用。</p>
      </div>

      <div class="toolbar">
        <input class="input" id="newGroupName" placeholder="新卡片组名称">
        <button class="icon-btn primary" id="addGroup" title="新建卡片组" aria-label="新建卡片组">+</button>
      </div>

      <div class="groups" id="groups" aria-label="卡片组"></div>

      <div class="side-actions">
        <button class="btn" id="renameGroup">重命名</button>
        <button class="btn warn" id="deleteGroup">删除组</button>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div class="deck-title">
          <h2 id="deckTitle">卡片组</h2>
          <p id="deckMeta">准备开始</p>
        </div>
        <div class="top-actions">
          <button class="btn" id="openGroups">卡片组</button>
          <button class="btn" id="openEditor">导入/编辑</button>
          <button class="btn" id="shuffleCards">随机</button>
          <button class="btn" id="resetProgress">重置进度</button>
          <button class="btn primary" id="focusStudy">专注学习</button>
        </div>
      </div>

      <section class="stage">
        <div class="study">
          <div id="cardHost"></div>

          <div class="controls">
            <button class="icon-btn" id="prevCard" title="上一张" aria-label="上一张">‹</button>
            <button class="btn primary flip-btn" id="flipCard">翻转</button>
            <button class="icon-btn" id="nextCard" title="下一张" aria-label="下一张">›</button>
          </div>

          <div class="progress">
            <div class="progress-row">
              <span id="progressText">0 / 0</span>
              <span id="sideText">正面</span>
            </div>
            <div class="meter" aria-hidden="true"><span id="meter"></span></div>
          </div>
          <div class="motivation" id="motivation">
            <span id="motivationText">今天也在变强。</span>
            <span class="timer-text" id="timerText">阅读 5s</span>
            <span class="timer-track" aria-hidden="true"><span class="timer-fill" id="timerFill"></span></span>
          </div>
        </div>

        <aside class="concept-map" aria-label="全景脑图">
          <div class="map-resizer" id="mapResizer" role="separator" aria-orientation="vertical" title="drag to resize map"></div>
          <div class="map-head">
            <strong id="mapTitle">卡片组</strong>
            <span id="mapMeta">0 张</span>
          </div>
          <div class="map-root" id="mapRoot">卡片组</div>
          <div class="map-branches" id="conceptMap"></div>
        </aside>

        <aside class="panel" aria-label="编辑和导入">
          <div class="tabs">
            <button class="tab active" data-tab="add">添加</button>
            <button class="tab" data-tab="import">批量</button>
            <button class="tab" data-tab="manage">管理</button>
          </div>

          <div class="pane active" id="pane-add">
            <label for="chapterInput">章节</label>
            <input class="input" id="chapterInput" placeholder="例如：第一章 / 情绪理论 / 默认">

            <label for="frontInput">正面</label>
            <textarea id="frontInput" placeholder="例如：什么是间隔重复？"></textarea>
            <label for="backInput">反面</label>
            <textarea id="backInput" placeholder="例如：按逐渐拉长的时间间隔复习，以降低遗忘。"></textarea>
            <button class="btn primary" id="addCard">添加卡片</button>
            <p class="hint">双链在卡片正面右上角设置；也可在反面写 [[概念名]] 自动识别。</p>
          </div>

          <div class="pane" id="pane-import">
            <label for="promptMode">提示词模板</label>
            <select id="promptMode">
              <option value="deep">高级理解：思维导图 + 形象记忆</option>
              <option value="standard">标准卡片：清晰问答</option>
              <option value="exam">考试速记：高频考点</option>
            </select>
            <label for="promptEditor">可编辑提示词</label>
            <textarea class="prompt-editor" id="promptEditor"></textarea>
            <label for="importChapterSelect">导入到章节</label>
            <select id="importChapterSelect"></select>
            <input class="input" id="importChapterName" placeholder="新建章节名">

            <label for="bulkInput">粘贴 GPT 生成的卡片</label>
            <textarea id="bulkInput" placeholder="每行一张：
正面 | 反面
正面<Tab>反面
Q: 正面
A: 反面"></textarea>
            <div class="two">
              <button class="btn primary" id="importCards">导入</button>
              <button class="btn" id="copyPrompt">复制GPT提示词</button>
            </div>
            <p class="hint">支持反面多行：第一行写“问题 | 答案开头”，后续行会保留在同一张卡；每张卡之间空一行。也支持 JSON。</p>
          </div>

          <div class="pane" id="pane-manage">
            <div class="setting-row">
              <label for="timerSeconds">背面阅读秒表（秒）</label>
              <input class="input" id="timerSeconds" type="number" min="0" max="60" step="1" value="5">
            </div>
            <p class="hint">翻到背面时开始倒计时；设为 0 可关闭秒表。</p>
            <div class="two">
              <button class="btn" id="exportDeck">导出当前组</button>
              <button class="btn warn" id="clearDeck">清空当前组</button>
            </div>
            <div class="card-list" id="cardList"></div>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const STORAGE_KEY = "ipad-memory-cards-v1";
    const TIMER_KEY = "ipad-memory-cards-timer-seconds";
    const MAP_LAYOUT_KEY = "ipad-memory-cards-map-layout-v4";
    const MAP_WIDTH_KEY = "ipad-memory-cards-map-width-v1";

    const sampleState = {
      activeGroupId: "g-default",
      groups: [
        {
          id: "g-default",
          name: "示例：学习方法",
          cards: [
            {
              id: "c-1",
              front: "什么是主动回忆？",
              back: "先尝试从记忆里提取答案，再看材料校正。它比单纯重读更能暴露知识缺口。"
            },
            {
              id: "c-2",
              front: "把资料发给 GPT 生成卡片时，最重要的约束是什么？",
              back: "要求每张卡只考一个知识点，并固定输出格式，例如：正面 | 反面。"
            },
            {
              id: "c-3",
              front: "空格键在这个页面里做什么？",
              back: "当你没有在输入框里打字时，按空格会翻转当前卡片。"
            }
          ]
        }
      ]
    };

    let state = loadState();
    let mapLayouts = loadMapLayouts();
    let currentIndex = 0;
    let flipped = false;
    let motivationIndex = 0;
    let touchStartX = 0;
    let touchStartY = 0;
    let mapPointerDrag = null;
    let mapResizeDrag = null;
    let suppressMapClick = false;
    let linkEditorOpen = false;
    let linkQuery = "";
    let mapWidth = clampNumber(Number(localStorage.getItem(MAP_WIDTH_KEY) || 340), 280, 520);
    let timerSeconds = Number(localStorage.getItem(TIMER_KEY) || 5);
    let timerRemaining = timerSeconds;
    let timerStartedAt = 0;
    let timerId = 0;

    const motivations = [
      "今天也在变强。✨",
      "答不出也没关系，记忆正在长出来。💪",
      "再来一张，脑子会感谢你。⚡",
      "你不是在背题，你是在升级自己。🚀",
      "小步快跑，长期稳赢。🌈",
      "这张卡片拿下，世界亮一点。🌟",
      "保持节奏，答案会越来越熟。🎯"
    ];

    const promptTemplates = {
      deep: `请把资料整理成**可导入卡片程序的高级记忆卡片**。

**严格输出格式：**
具体问题 | 反面内容

**注意：**
- 每张卡片第一行必须包含一个竖线：具体问题 | 一句话答案...
- 「正面」指具体问题，不要真的输出「正面」两个字。
- 「反面」指答案内容，不要真的输出「反面」两个字。
- 反面允许换行。
- 每张卡片之间空一行。
- 不要表格，不要编号，不要解释。

**反面必须包含四块：**
一句话答案：
思维导图：
形象记忆：
真实案例：

**规则：**
1. 每张卡只考一个知识点。
2. 正面要具体，不能太大。
3. 思维导图必须是树状，不准压缩成一行。
4. 每张卡的思维导图只画当前知识点的小图，不画整章大图。
5. 思维导图最多4个一级分支，最多2层。
6. 形象记忆必须是具体画面，要有「人、动作、场景」。
7. 真实案例只写一个小场景，说明这个知识点怎么在真实学习、咨询、工作或生活里使用。
8. 宁可多拆卡，也不要一张卡太拥挤。
9. 思维导图第一行必须是2-6个字的「节点短语」，方便程序把这张卡显示成思维导图节点。
10. 相邻卡片之间要有清晰递进关系：前一张铺垫，后一张延伸；同类概念尽量连续输出。
11. 如果两个知识点有层级关系，正面和思维导图里要重复同一个关键词，例如「共情」「澄清」「目标」，方便程序识别并只连接真正相关的卡片。
12. 不要为了连接而硬凑关系；没有逻辑关系的卡片不要写相同关键词。
13. 如果某张卡和另一个关键概念存在明确双向联系，可在反面任意一块中写 [[概念名]]，程序会把它当作双链优先连接；不要滥用双链。

**示例：**
共情的核心是什么？ | 一句话答案：共情不是简单说「我懂你」，而是准确说出来访者的感受。
思维导图：
共情
├─ 不是：空泛安慰
├─ 核心：说准感受
├─ 效果：被听见、不被评判
└─ 目的：让来访者继续表达
形象记忆：像咨询师拿着字幕牌，把来访者心里说不出的感受写出来。
真实案例：来访者说“我就是很烦”，咨询师回应“你像是又累又怕没人理解”，对方开始继续说细节。

**资料如下：**`,

      standard: `请把我接下来提供的资料整理成**记忆卡片**。

**要求：**
1. **每张卡片只考一个知识点**。
2. **正面**写问题或提示，**反面**写准确、简洁、可背诵的答案。
3. **不要输出解释**，**不要编号**。
4. 严格使用以下格式，**每行一张**：
**正面 | 反面**

**资料如下：**`,

      exam: `请把我接下来提供的资料整理成**考试速记卡片**。

**目标：**
优先提取最可能被考到、最容易混淆、最需要快速回忆的内容。

**输出格式：**
每行一张卡片：
正面 | 反面

**正面要求：**
- 使用考题式问题
- 突出**定义、区别、原因、步骤、结论、易错点**

**反面要求：**
- 先写**最短可背答案**
- 再写**易错提醒**
- 必要时写一个**口诀/形象记忆**

**限制：**
- 不要编号
- 不要输出额外说明
- 每张卡只考一个点

**资料如下：**`
    };

    const $ = (id) => document.getElementById(id);
    const els = {
      groups: $("groups"),
      newGroupName: $("newGroupName"),
      addGroup: $("addGroup"),
      renameGroup: $("renameGroup"),
      deleteGroup: $("deleteGroup"),
      deckTitle: $("deckTitle"),
      deckMeta: $("deckMeta"),
      chapterSelect: $("chapterSelect"),
      cardHost: $("cardHost"),
      prevCard: $("prevCard"),
      nextCard: $("nextCard"),
      flipCard: $("flipCard"),
      progressText: $("progressText"),
      sideText: $("sideText"),
      motivation: $("motivation"),
      motivationText: $("motivationText"),
      timerText: $("timerText"),
      timerFill: $("timerFill"),
      timerSeconds: $("timerSeconds"),
      mapTitle: $("mapTitle"),
      mapRoot: $("mapRoot"),
      mapMeta: $("mapMeta"),
      conceptMap: $("conceptMap"),
      mapResizer: $("mapResizer"),
      meter: $("meter"),
      drawerScrim: $("drawerScrim"),
      openGroups: $("openGroups"),
      openEditor: $("openEditor"),
      shuffleCards: $("shuffleCards"),
      resetProgress: $("resetProgress"),
      focusStudy: $("focusStudy"),
      cover: $("cover"),
      startStudy: $("startStudy"),
      skipCover: $("skipCover"),
      chapterInput: $("chapterInput"),
      frontInput: $("frontInput"),
      backInput: $("backInput"),
      addCard: $("addCard"),
      bulkInput: $("bulkInput"),
      promptMode: $("promptMode"),
      promptEditor: $("promptEditor"),
      importChapterSelect: $("importChapterSelect"),
      importChapterName: $("importChapterName"),
      importCards: $("importCards"),
      copyPrompt: $("copyPrompt"),
      exportDeck: $("exportDeck"),
      clearDeck: $("clearDeck"),
      cardList: $("cardList"),
      toast: $("toast")
    };

    function uid(prefix) {
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return structuredClone(sampleState);
        const parsed = JSON.parse(saved);
        if (!parsed.groups || !parsed.groups.length) return structuredClone(sampleState);
        return parsed;
      } catch {
        return structuredClone(sampleState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function activeGroup() {
      return state.groups.find((group) => group.id === state.activeGroupId) || state.groups[0];
    }

    function cardChapter(card) {
      return String((card && card.chapter) || "默认章节").trim() || "默认章节";
    }

    function groupChapters(group) {
      return uniqueList((group.cards || []).map(cardChapter));
    }

    function activeChapter(group) {
      const selected = group.activeChapter || "__chapters";
      const chapters = groupChapters(group);
      return selected === "__chapters" || selected === "__all" || chapters.includes(selected) ? selected : "__chapters";
    }

    function studyIndexes(group) {
      const chapter = activeChapter(group);
      if (chapter === "__chapters") return [];
      return (group.cards || [])
        .map((card, index) => ({ card, index }))
        .filter((item) => chapter === "__all" || cardChapter(item.card) === chapter)
        .map((item) => item.index);
    }

    function clampIndex() {
      const group = activeGroup();
      const indexes = studyIndexes(group);
      if (!indexes.length) {
        currentIndex = Math.min(Math.max(currentIndex, 0), Math.max(group.cards.length - 1, 0));
        return;
      }
      if (!indexes.includes(currentIndex)) currentIndex = indexes[0];
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1900);
    }

    function render() {
      const group = activeGroup();
      if (!group) return;
      clampIndex();
      ensureAutoBacklinks(group);
      renderGroups(group);
      renderChapters(group);
      renderStudy(group);
      renderCardList(group);
      saveState();
    }

    function renderGroups(active) {
      els.groups.innerHTML = "";
      state.groups.forEach((group) => {
        const button = document.createElement("button");
        button.className = `group${group.id === active.id ? " active" : ""}`;
        button.type = "button";
        button.innerHTML = `
          <span>
            <span class="group-name">${escapeHtml(group.name)}</span>
            <span class="group-count">${group.cards.length} 张卡片</span>
          </span>
          <span aria-hidden="true">›</span>
        `;
        button.addEventListener("click", () => {
          state.activeGroupId = group.id;
          group.activeChapter = "__chapters";
          currentIndex = 0;
          flipped = false;
          closeDrawers();
          render();
        });
        els.groups.appendChild(button);
      });
    }

    function renderChapters(group) {
      const chapters = groupChapters(group);
      const selected = activeChapter(group);
      if (!els.chapterSelect) {
        renderImportChapterOptions(group);
        return;
      }
      els.chapterSelect.innerHTML = [
        `<option value="__all">全部章节 (${group.cards.length})</option>`,
        ...chapters.map((chapter) => {
          const count = group.cards.filter((card) => cardChapter(card) === chapter).length;
          return `<option value="${escapeHtml(chapter)}">${escapeHtml(chapter)} (${count})</option>`;
        })
      ].join("");
      els.chapterSelect.value = selected === "__chapters" ? "__all" : selected;
      els.chapterSelect.disabled = chapters.length <= 1 && !group.cards.length;
      renderImportChapterOptions(group);
    }

    function renderImportChapterOptions(group) {
      if (!els.importChapterSelect) return;
      const chapters = groupChapters(group);
      const current = activeChapter(group);
      els.importChapterSelect.innerHTML = [
        `<option value="__auto">按文本章节标题自动拆分</option>`,
        `<option value="__new">新建章节</option>`,
        ...chapters.map((chapter) => `<option value="${escapeHtml(chapter)}">${escapeHtml(chapter)}</option>`)
      ].join("");
      els.importChapterSelect.value = current !== "__chapters" && current !== "__all" && chapters.includes(current) ? current : "__auto";
      if (els.importChapterName) els.importChapterName.style.display = els.importChapterSelect.value === "__new" ? "block" : "none";
    }

    function renderStudy(group) {
      const chapter = activeChapter(group);
      if (chapter === "__chapters") {
        renderChapterHub(group);
        return;
      }
      const indexes = studyIndexes(group);
      const count = indexes.length;
      const localIndex = indexes.indexOf(currentIndex);
      els.deckTitle.textContent = group.name;
      els.deckMeta.textContent = "";
      els.progressText.textContent = count ? `${localIndex + 1} / ${count}` : "0 / 0";
      els.sideText.textContent = flipped ? "反面" : "正面";
      els.motivationText.textContent = count ? motivations[motivationIndex % motivations.length] : "先放进一张卡片，今天就开始。";
      els.meter.style.width = count ? `${((localIndex + 1) / count) * 100}%` : "0";
      updateTimerDisplay();
      els.prevCard.disabled = count <= 1;
      els.nextCard.disabled = count <= 1;
      els.flipCard.disabled = count === 0;
      renderConceptMap(group);

      if (!count) {
        els.cardHost.innerHTML = `<div class="empty">这个章节还没有卡片。可回到章节目录或导入新卡片。</div>`;
        return;
      }

      const card = group.cards[currentIndex];
      els.cardHost.innerHTML = `
        <div class="card-wrap">
          <div class="card${flipped ? " flipped" : ""}" id="studyCard" tabindex="0" role="button" aria-label="点击翻转卡片">
            <article class="face front">
              ${renderCardLinks(card)}
              <div class="card-text">${escapeHtml(card.front)}</div>
            </article>
            <article class="face back answer">
              ${formatBack(card.back)}
            </article>
          </div>
        </div>
      `;
      $("studyCard").addEventListener("click", flip);
      const linkArea = $("cardLinks");
      if (linkArea) {
        linkArea.addEventListener("click", handleCardLinksClick);
        const linkSearch = $("linkSearch");
        if (linkSearch) {
          linkSearch.addEventListener("input", handleLinkSearchInput);
          linkSearch.addEventListener("click", (event) => event.stopPropagation());
        }
      }
    }

    function renderChapterHub(group) {
      const chapters = groupChapters(group);
      els.deckTitle.textContent = group.name;
      els.deckMeta.textContent = "";
      els.progressText.textContent = chapters.length ? `${chapters.length} 章` : "0 章";
      els.sideText.textContent = "章节";
      els.meter.style.width = "0";
      els.prevCard.disabled = true;
      els.nextCard.disabled = true;
      els.flipCard.disabled = true;
      stopReadingTimer();
      renderConceptMap(group);
      if (!chapters.length) {
        els.cardHost.innerHTML = `<div class="empty">这个卡片组还没有卡片。导入时可用 # 第一章 或 【章节名】 自动拆分章节。</div>`;
        return;
      }
      els.cardHost.innerHTML = `
        <div class="chapter-hub">
          <div class="chapter-hub-head">
            <h3>章节目录</h3>
            <button class="btn" type="button" data-enter-chapter="__all">全部学习</button>
          </div>
          <div class="chapter-grid">
            ${chapters.map((chapter) => chapterCard(group, chapter)).join("")}
          </div>
        </div>
      `;
      els.cardHost.querySelector(".chapter-hub").addEventListener("click", handleChapterHubClick);
    }

    function chapterCard(group, chapter) {
      const count = group.cards.filter((card) => cardChapter(card) === chapter).length;
      return `
        <button class="chapter-card" type="button" data-enter-chapter="${escapeHtml(chapter)}">
          <strong>${escapeHtml(chapter)}</strong>
          <span>${count} 张卡片</span>
          <span class="mini-actions">
            <span class="link-chip">进入</span>
            <span class="link-chip" data-rename-chapter="${escapeHtml(chapter)}">重命名</span>
          </span>
        </button>
      `;
    }

    function renderCardLinks(card) {
      const links = displayCardLinks(card);
      const chips = links.slice(0, 2).map((link) => `<span class="link-chip">[[${escapeHtml(link)}]]</span>`).join("");
      const editor = linkEditorOpen ? `
        <div class="link-editor" id="linkEditorPanel">
          <div class="link-list">
            ${links.length ? links.map((link) => `<button class="link-chip" type="button" data-remove-link="${escapeHtml(link)}">[[${escapeHtml(link)}]] ×</button>`).join("") : `<span class="link-empty">暂无双链</span>`}
          </div>
          <input id="linkSearch" type="search" value="${escapeHtml(linkQuery)}" placeholder="搜索卡片，点击添加双链">
          <div class="link-suggestions" id="linkSuggestions">
            ${renderLinkSuggestions(linkQuery, links)}
          </div>
        </div>
      ` : "";
      return `<div class="card-links" id="cardLinks">${chips}<button class="link-chip add" id="editLinks" type="button">${links.length ? "编辑双链" : "+ 双链"}</button>${editor}</div>`;
    }

    function handleCardLinksClick(event) {
      event.stopPropagation();
      const toggle = event.target.closest("#editLinks");
      const remove = event.target.closest("[data-remove-link]");
      const add = event.target.closest("[data-add-link]");
      const group = activeGroup();
      const card = group.cards[currentIndex];
      if (!card) return;
      if (toggle) {
        editCardLinks();
        return;
      }
      if (remove) {
        const value = remove.dataset.removeLink;
        removeBacklinkPair(group, currentIndex, value);
        render();
        showToast("已删除双链");
        return;
      }
      if (add) {
        const value = add.dataset.addLink;
        addBacklinkPair(group, currentIndex, value);
        linkQuery = "";
        render();
        showToast("已添加双链");
      }
    }

    function handleLinkSearchInput(event) {
      const group = activeGroup();
      const card = group.cards[currentIndex];
      if (!card) return;
      linkQuery = event.target.value;
      const suggestions = $("linkSuggestions");
      if (suggestions) suggestions.innerHTML = renderLinkSuggestions(linkQuery, cardLinks(card));
    }

    function handleChapterHubClick(event) {
      const rename = event.target.closest("[data-rename-chapter]");
      const enter = event.target.closest("[data-enter-chapter]");
      const group = activeGroup();
      if (rename) {
        event.preventDefault();
        event.stopPropagation();
        renameChapter(group, rename.dataset.renameChapter);
        return;
      }
      if (enter) {
        group.activeChapter = enter.dataset.enterChapter;
        currentIndex = studyIndexes(group)[0] || 0;
        clampIndex();
        flipped = false;
        render();
      }
    }

    function renameChapter(group, oldName) {
      const next = prompt("新的章节名称", oldName);
      if (!next || !next.trim()) return;
      group.cards.forEach((card) => {
        if (cardChapter(card) === oldName) card.chapter = next.trim();
      });
      if (group.activeChapter === oldName) group.activeChapter = next.trim();
      render();
      showToast("已重命名章节");
    }

    function renderConceptMap(group) {
      const cards = group.cards || [];
      const current = cards[currentIndex];
      if (els.mapTitle) els.mapTitle.textContent = group.name || "卡片组";
      els.mapRoot.textContent = group.name || "卡片组";
      els.mapMeta.textContent = current ? `${currentIndex + 1}/${cards.length} · 双链云图` : `${cards.length} 张`;
      if (!cards.length) {
        els.conceptMap.innerHTML = `<p class="map-empty">导入卡片后，这里会自动生成整组卡片的双链云图。</p>`;
        return;
      }
      const graph = buildMapGraph(group, currentIndex);
      if (!graph.nodes.length && !graph.dots.length) {
        els.conceptMap.innerHTML = `<p class="map-empty">这组卡片还没有双链关系。</p>`;
        return;
      }
      const points = [...graph.nodes, ...graph.dots];
      els.conceptMap.innerHTML = `
        <div class="map-canvas" id="mapCanvas">
          <svg class="map-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            ${graph.edges.map((edge) => mapEdgePath(edge, points, current.id)).join("")}
          </svg>
          ${graph.dots.map(mapGraphDot).join("")}
          ${graph.nodes.map(mapGraphNode).join("")}
        </div>
      `;
    }

    function buildMapGraph(group, activeIndex) {
      const layout = mapLayouts[group.id] || {};
      const cards = group.cards || [];
      const linkedIndexes = linkedCardIndexes(cards);
      const visibleIndexes = localGraphIndexes(cards, activeIndex);
      const nodes = visibleIndexes.map((index) => {
        const card = cards[index];
        const position = graphNodePosition(card, index, activeIndex, visibleIndexes, layout, linkedIndexes);
        return {
          index,
          cardId: card.id,
          active: index === activeIndex,
          label: compactPhrase(card, index === activeIndex ? 7 : 5),
          fullTitle: card.front,
          x: position.x,
          y: position.y
        };
      });
      return { nodes, edges: buildGraphEdges(cards, activeIndex), dots: buildGraphDots(cards, visibleIndexes, activeIndex, linkedIndexes) };
    }

    function graphNodePosition(card, index, activeIndex, visibleIndexes, layout, linkedIndexes) {
      const saved = layout[card.id];
      if (saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)) {
        return {
          x: clampNumber(saved.x, 8, 92),
          y: clampNumber(saved.y, 8, 92)
        };
      }
      return globalGraphPosition(index, activeIndex, linkedIndexes);
    }

    function mapGraphNode(node) {
      const active = node.active ? " active" : "";
      const converge = node.active ? "" : " converge";
      const focus = node.active ? "" : " linked-focus";
      return `
        <button class="map-node graph-node${active}${converge}${focus}" type="button" data-map-jump="${node.index}" data-card-id="${escapeHtml(node.cardId)}" title="${escapeHtml(node.fullTitle)}" style="left:${node.x}%; top:${node.y}%;">
          <span>${escapeHtml(node.label)}</span>
        </button>
      `;
    }

    function mapGraphDot(dot) {
      return `<span class="graph-dot linked" data-card-id="${escapeHtml(dot.cardId)}" style="left:${dot.x}%; top:${dot.y}%;"></span>`;
    }

    function mapEdgePath(edge, nodes, activeCardId) {
      const from = nodes.find((node) => node.cardId === edge.from);
      const to = nodes.find((node) => node.cardId === edge.to);
      if (!from || !to) return "";
      const active = from.cardId === activeCardId || to.cardId === activeCardId ? " active" : "";
      return `<line class="${active}" x1="${from.x}" y1="${from.y}" x2="${to.x}" y2="${to.y}" />`;
    }

    function localGraphIndexes(cards, activeIndex) {
      const linked = explicitLinkedIndexes(cards, activeIndex);
      if (!linked.length && !displayCardLinks(cards[activeIndex] || {}).length) return [];
      const indexes = new Set([activeIndex]);
      explicitLinkedIndexes(cards, activeIndex)
        .slice(0, 5)
        .forEach((index) => indexes.add(index));
      return [...indexes].sort((a, b) => a - b);
    }

    function defaultGraphPosition(index, activeIndex, visibleIndexes) {
      if (index === activeIndex) return { x: 50, y: 50 };
      const neighbors = visibleIndexes.filter((item) => item !== activeIndex);
      const slot = Math.max(0, neighbors.indexOf(index));
      const positions = [
        { x: 72, y: 32 },
        { x: 75, y: 66 },
        { x: 27, y: 34 },
        { x: 25, y: 66 },
        { x: 50, y: 82 }
      ];
      return positions[slot] || { x: 50, y: 18 };
    }

    function globalGraphPosition(index, activeIndex, linkedIndexes) {
      return circularGraphPosition(index, activeIndex, linkedIndexes);
    }

    function buildGraphDots(cards, visibleIndexes, activeIndex, linkedIndexes) {
      const visible = new Set(visibleIndexes);
      return linkedIndexes
        .filter((index) => !visible.has(index))
        .slice(0, 80)
        .map((index) => ({ cardId: cards[index].id, index, ...graphDotPosition(index, activeIndex, linkedIndexes) }));
    }

    function graphDotPosition(index, activeIndex, linkedIndexes) {
      return circularGraphPosition(index, activeIndex, linkedIndexes);
    }

    function circularGraphPosition(index, activeIndex, linkedIndexes = []) {
      const list = linkedIndexes.length ? linkedIndexes : [index];
      const rank = Math.max(0, list.indexOf(index));
      const total = Math.max(1, list.length);
      const angle = ((rank / total) * Math.PI * 2) - Math.PI / 2;
      const ring = total <= 5 ? 28 : (rank % 3 === 0 ? 22 : (rank % 3 === 1 ? 32 : 39));
      const wobble = total <= 5 ? 0 : ((rank % 4) - 1.5) * 1.2;
      return {
        x: clampNumber(50 + Math.cos(angle) * (ring + wobble), 14, 86),
        y: clampNumber(50 + Math.sin(angle) * (ring + wobble), 14, 86)
      };
    }

    function linkedCardIndexes(cards) {
      const linked = new Set();
      cards.forEach((card, index) => {
        if (displayCardLinks(card).length) linked.add(index);
      });
      cards.forEach((card, index) => {
        const text = cardConceptText(card).toLowerCase();
        cards.forEach((other, otherIndex) => {
          if (index === otherIndex) return;
          if (displayCardLinks(other).some((target) => text.includes(target.toLowerCase()))) linked.add(index);
        });
      });
      return [...linked].sort((a, b) => a - b);
    }

    function buildGraphEdges(cards, activeIndex) {
      const edges = [];
      if (!cards[activeIndex]) return edges;
      explicitLinkedIndexes(cards, activeIndex).forEach((index) => {
        edges.push({ from: cards[activeIndex].id, to: cards[index].id });
      });
      const activeText = cardConceptText(cards[activeIndex]).toLowerCase();
      cards.forEach((card, index) => {
        if (index === activeIndex) return;
        const linkedToActive = displayCardLinks(card).some((target) => activeText.includes(target.toLowerCase()));
        if (linkedToActive) edges.push({ from: card.id, to: cards[activeIndex].id });
      });
      return uniqueEdges(edges);
    }

    function explicitLinkedIndexes(cards, activeIndex) {
      const current = cards[activeIndex];
      if (!current) return [];
      const targets = displayCardLinks(current).map((item) => item.toLowerCase());
      const activeText = cardConceptText(current).toLowerCase();
      return cards
        .map((card, index) => ({ card, index, text: cardConceptText(card).toLowerCase() }))
        .filter((item) => item.index !== activeIndex)
        .filter((item) => {
          const outbound = targets.some((target) => item.text.includes(target));
          const inbound = displayCardLinks(item.card).some((target) => activeText.includes(target.toLowerCase()));
          return outbound || inbound;
        })
        .map((item) => item.index);
    }

    function wikiLinks(value) {
      return [...String(value || "").matchAll(/\[\[([^\]]{1,24})\]\]/g)]
        .map((match) => match[1].trim().toLowerCase())
        .filter(Boolean);
    }

    function cardLinks(card) {
      const explicit = Array.isArray(card.links) ? card.links : [];
      return uniqueList([...explicit, ...wikiLinks(card.back)])
        .map((item) => item.trim())
        .filter(Boolean)
        .slice(0, 8);
    }

    function displayCardLinks(card) {
      if (!card) return [];
      if (card._autoLinksReady && !card._manualLinksReady && !wikiLinks(card.back).length) return [];
      return cardLinks(card);
    }

    function uniqueList(items) {
      return [...new Set(items.map((item) => String(item || "").trim()).filter(Boolean))];
    }

    function addBacklinkPair(group, sourceIndex, targetLabel) {
      const source = group.cards[sourceIndex];
      const target = findCardByLinkLabel(group.cards, targetLabel, sourceIndex);
      if (!source || !target) return;
      source.links = uniqueList([...(Array.isArray(source.links) ? source.links : []), compactPhrase(target, 7)]).slice(0, 8);
      target.card.links = uniqueList([...(Array.isArray(target.card.links) ? target.card.links : []), compactPhrase(source, 7)]).slice(0, 8);
      source._manualLinksReady = true;
      target.card._manualLinksReady = true;
    }

    function removeBacklinkPair(group, sourceIndex, targetLabel) {
      const source = group.cards[sourceIndex];
      const target = findCardByLinkLabel(group.cards, targetLabel, sourceIndex);
      if (!source) return;
      source.links = removeLinkLabel(source.links, targetLabel);
      if (target) target.card.links = removeLinkLabel(target.card.links, compactPhrase(source, 7));
    }

    function removeLinkLabel(links, label) {
      const normalized = String(label || "").toLowerCase();
      return uniqueList((Array.isArray(links) ? links : []).filter((link) => String(link || "").toLowerCase() !== normalized));
    }

    function findCardByLinkLabel(cards, label, sourceIndex) {
      const normalized = String(label || "").toLowerCase();
      return cards
        .map((card, index) => ({ card, index, label: compactPhrase(card, 7).toLowerCase(), text: cardConceptText(card).toLowerCase() }))
        .find((item) => item.index !== sourceIndex && (item.label === normalized || item.text.includes(normalized)));
    }

    function ensureAutoBacklinks(group) {
      if (!group || !Array.isArray(group.cards)) return;
      group.cards.forEach((card) => {
        if (!card.id) card.id = uid("c");
      });
    }

    function autoBacklinkLabels(cards, index) {
      const candidates = scoreRelatedCards(cards, index, { includeNeighbors: true })
        .filter((item) => item.score >= 3)
        .slice(0, 2)
        .map((item) => compactPhrase(cards[item.index], 7));
      return uniqueList(candidates);
    }

    function renderLinkSuggestions(query, existingLinks) {
      const group = activeGroup();
      const card = group.cards[currentIndex];
      if (!card) return "";
      const existing = new Set(existingLinks.map((item) => item.toLowerCase()));
      const q = String(query || "").trim().toLowerCase();
      const suggestions = group.cards
        .map((item, index) => ({ card: item, index, label: compactPhrase(item, 7), text: cardConceptText(item).toLowerCase() }))
        .filter((item) => item.index !== currentIndex)
        .filter((item) => !existing.has(item.label.toLowerCase()))
        .map((item) => ({ ...item, score: linkSuggestionScore(item, q) }))
        .filter((item) => !q || item.score > 0)
        .sort((a, b) => b.score - a.score || a.index - b.index)
        .slice(0, 6);
      if (!suggestions.length) return `<span class="link-empty">没有匹配卡片</span>`;
      return suggestions
        .map((item) => `<button class="link-chip" type="button" data-add-link="${escapeHtml(item.label)}">+ [[${escapeHtml(item.label)}]]</button>`)
        .join("");
    }

    function linkSuggestionScore(item, query) {
      if (!query) return Math.max(1, 20 - Math.abs(item.index - currentIndex));
      let score = 0;
      if (item.label.toLowerCase().includes(query)) score += 12;
      if (String(item.card.front || "").toLowerCase().includes(query)) score += 8;
      if (item.text.includes(query)) score += 4;
      return score;
    }

    function editCardLinks() {
      linkEditorOpen = !linkEditorOpen;
      if (!linkEditorOpen) linkQuery = "";
      render();
      return;
      const group = activeGroup();
      const card = group.cards[currentIndex];
      if (!card) return;
      const current = cardLinks(card).join("，");
      const value = prompt("双链概念，用逗号或空格分隔。例：共情，澄清，咨询目标", current);
      if (value === null) return;
      card.links = uniqueList(value.split(/[,，、\s]+/)).slice(0, 8);
      render();
      showToast("已更新双链");
    }

    function uniqueEdges(edges) {
      const seen = new Set();
      return edges.filter((edge) => {
        const key = [edge.from, edge.to].sort().join("|");
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function compactPhrase(card, limit = 8) {
      const sections = extractBackSections(card.back);
      const source = (sections && sections.map) || (sections && sections.summary) || card.front || "";
      const candidates = String(source)
        .split(/\r?\n|[，。；：:、,.!?？！（）()《》“”"']/)
        .map((item) => item.replace(/[├└│─\-*]/g, " ").replace(/\s+/g, "").trim())
        .filter((item) => item.length >= 2);
      return compactMapLabel(candidates[0] || card.front, limit);
    }

    function loadMapLayouts() {
      try {
        return JSON.parse(localStorage.getItem(MAP_LAYOUT_KEY) || "{}") || {};
      } catch {
        return {};
      }
    }

    function saveMapLayouts() {
      localStorage.setItem(MAP_LAYOUT_KEY, JSON.stringify(mapLayouts));
    }

    function setCardMapPosition(groupId, cardId, x, y) {
      mapLayouts[groupId] = mapLayouts[groupId] || {};
      mapLayouts[groupId][cardId] = {
        x: clampNumber(x, 8, 92),
        y: clampNumber(y, 8, 92)
      };
      saveMapLayouts();
    }

    function clampNumber(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function applyMapWidth() {
      mapWidth = clampNumber(Number(mapWidth) || 340, 280, 520);
      document.documentElement.style.setProperty("--map-width", `${mapWidth}px`);
    }

    function cardConceptText(card) {
      const sections = extractBackSections(card.back) || {};
      return [card.front, sections.summary, sections.map, sections.image, sections.case, ...(Array.isArray(card.links) ? card.links : [])].filter(Boolean).join(" ");
    }

    function scoreRelatedCards(cards, currentIndex, options = {}) {
      const currentTokens = keywordTokens(cardConceptText(cards[currentIndex] || {}));
      return cards
        .map((card, index) => {
          if (index === currentIndex) return null;
          if (!options.includeNeighbors && (index === currentIndex - 1 || index === currentIndex + 1)) return null;
          const tokens = keywordTokens(cardConceptText(card));
          const shared = [...currentTokens].filter((token) => tokens.has(token)).slice(0, 5);
          return { index, score: shared.length, shared };
        })
