<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="记忆卡片">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#fff7fb">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>记忆卡片</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #101828;
      --muted: rgba(16, 24, 40, 0.6);
      --line: rgba(255, 255, 255, 0.56);
      --glass: rgba(255, 255, 255, 0.48);
      --glass-strong: rgba(255, 255, 255, 0.74);
      --glass-soft: rgba(255, 255, 255, 0.3);
      --accent: #ff4d8d;
      --accent-strong: #7c3aed;
      --accent-soft: rgba(255, 77, 141, 0.16);
      --blue: #00a8ff;
      --rose: #ff5d6c;
      --gold: #ffd23f;
      --lime: #7cff6b;
      --aqua: #16f4d0;
      --shadow: 0 26px 90px rgba(35, 47, 72, 0.18);
      --inner-light: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      --radius: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 16%, rgba(255, 77, 141, 0.34), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(255, 210, 63, 0.5), transparent 24%),
        radial-gradient(circle at 72% 88%, rgba(0, 168, 255, 0.42), transparent 34%),
        radial-gradient(circle at 24% 82%, rgba(22, 244, 208, 0.34), transparent 27%),
        linear-gradient(135deg, #fff7fb 0%, #f4fbff 42%, #fffbea 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.08)),
        radial-gradient(circle at 50% 0, rgba(255, 255, 255, 0.46), transparent 38%);
      backdrop-filter: blur(2px);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      min-height: 100dvh;
      padding: max(14px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      position: relative;
    }

    .sidebar {
      position: fixed;
      top: 18px;
      bottom: 18px;
      left: 18px;
      z-index: 32;
      width: min(326px, calc(100vw - 36px));
      transform: translateX(calc(-100% - 30px));
      transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: calc(100dvh - 36px);
      padding: max(22px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      border: 1px solid var(--line);
      border-radius: 30px;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.3));
      backdrop-filter: blur(34px) saturate(1.55);
      box-shadow: var(--shadow), var(--inner-light);
    }

    body.drawer-left .sidebar {
      transform: translateX(0);
    }

    .brand {
      display: grid;
      gap: 6px;
      padding: 4px 8px 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 52px;
      gap: 10px;
    }

    .input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--ink);
      outline: 0;
      box-shadow: var(--inner-light);
      backdrop-filter: blur(20px) saturate(1.3);
    }

    .input {
      height: 52px;
      padding: 0 16px;
    }

    select {
      min-height: 48px;
      padding: 0 14px;
    }

    .input:focus,
    textarea:focus {
      border-color: rgba(15, 118, 110, 0.7);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }

    .icon-btn,
    .btn {
      min-height: 44px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.64);
      box-shadow: 0 10px 28px rgba(35, 47, 72, 0.08), var(--inner-light);
      backdrop-filter: blur(22px) saturate(1.35);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn {
      width: 52px;
      min-height: 52px;
      font-size: 25px;
      line-height: 1;
    }

    .btn {
      min-height: 50px;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 760;
    }

    .btn.primary,
    .icon-btn.primary {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.38);
      background: linear-gradient(135deg, #ff4d8d 0%, #7c3aed 52%, #00a8ff 100%);
      box-shadow: 0 16px 34px rgba(124, 58, 237, 0.24), var(--inner-light);
    }

    .btn.warn {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.38);
      background: linear-gradient(135deg, #ff5d6c, #ff8a00);
    }

    .btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 16px 38px rgba(35, 47, 72, 0.12), var(--inner-light);
    }

    .groups {
      display: grid;
      gap: 10px;
      overflow: auto;
      padding-right: 2px;
    }

    .group {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 62px;
      padding: 12px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.54);
      box-shadow: var(--inner-light);
      text-align: left;
    }

    .group.active {
      background: linear-gradient(140deg, rgba(255, 255, 255, 0.78), rgba(220, 249, 245, 0.58));
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 34px rgba(8, 116, 111, 0.12), var(--inner-light);
    }

    .group-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
    }

    .group-count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .side-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: auto;
    }

    main {
      min-width: 0;
      padding: max(12px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      padding: 8px 4px;
    }

    .deck-title {
      min-width: 0;
    }

    .deck-title h2 {
      margin: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 27px;
      letter-spacing: 0;
    }

    .deck-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .study {
      display: grid;
      gap: 16px;
    }

    .concept-map {
      display: grid;
      gap: 14px;
      min-height: 240px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0.32)),
        radial-gradient(circle at 16% 12%, rgba(255, 77, 141, 0.14), transparent 28%),
        radial-gradient(circle at 88% 92%, rgba(0, 168, 255, 0.15), transparent 32%);
      box-shadow: 0 18px 48px rgba(35, 47, 72, 0.1), var(--inner-light);
      backdrop-filter: blur(28px) saturate(1.35);
    }

    .map-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .map-head strong {
      font-size: 15px;
      font-weight: 900;
    }

    .map-head span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .map-root {
      justify-self: center;
      max-width: 100%;
      padding: 8px 13px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #ff4d8d, #7c3aed 54%, #00a8ff);
      box-shadow: 0 14px 30px rgba(124, 58, 237, 0.22), var(--inner-light);
      font-size: 13px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .map-branches {
      position: relative;
      display: grid;
      gap: 9px;
      max-height: min(48dvh, 430px);
      overflow: auto;
      padding: 8px 2px 6px;
      -webkit-overflow-scrolling: touch;
    }

    .map-level {
      position: relative;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      min-height: 58px;
      padding: 9px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.48);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.44), rgba(255, 255, 255, 0.22)),
        linear-gradient(90deg, rgba(255, 77, 141, 0.08), rgba(22, 244, 208, 0.08));
      box-shadow: var(--inner-light);
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .map-level::before {
      content: "";
      position: absolute;
      left: 33px;
      top: -10px;
      width: 2px;
      height: 12px;
      border-radius: 999px;
      background: rgba(124, 58, 237, 0.24);
    }

    .map-level:first-child::before {
      display: none;
    }

    .map-level.drag-over {
      transform: translateX(2px);
      border-color: rgba(124, 58, 237, 0.42);
      background: linear-gradient(135deg, rgba(255, 77, 141, 0.14), rgba(22, 244, 208, 0.16), rgba(255, 255, 255, 0.42));
    }

    .map-level-title {
      display: grid;
      gap: 2px;
      justify-items: center;
      color: rgba(16, 24, 40, 0.56);
      font-size: 12px;
      font-weight: 920;
    }

    .map-level-title::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--aqua));
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.48);
    }

    .map-level-title span {
      color: rgba(16, 24, 40, 0.42);
      font-size: 11px;
    }

    .map-level-nodes {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-width: 0;
    }

    .map-item {
      position: relative;
      min-width: 0;
    }

    .map-node {
      display: inline-grid;
      grid-template-columns: auto minmax(0, auto);
      gap: 6px;
      align-items: center;
      max-width: 118px;
      min-height: 32px;
      padding: 6px 9px;
      border-radius: 999px;
      color: rgba(16, 24, 40, 0.72);
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--inner-light);
      text-align: left;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .map-node[draggable="true"] {
      cursor: grab;
      touch-action: none;
    }

    .map-node.dragging {
      opacity: 0.56;
      transform: scale(0.98);
    }

    .map-node b {
      display: grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      color: rgba(16, 24, 40, 0.58);
      font-size: 10px;
      font-weight: 900;
    }

    .map-node span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 850;
    }

    .map-node .map-count {
      display: none;
    }

    .map-node.active {
      transform: translateY(-1px) scale(1.05);
      color: var(--ink);
      background: linear-gradient(135deg, rgba(255, 77, 141, 0.3), rgba(22, 244, 208, 0.28), rgba(255, 255, 255, 0.74));
      border-color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 28px rgba(0, 168, 255, 0.18), 0 0 0 4px rgba(255, 77, 141, 0.14), var(--inner-light);
    }

    .map-node.active b {
      color: #fff;
      background: linear-gradient(135deg, #ff4d8d, #7c3aed);
    }

    .map-children {
      display: none;
    }

    .map-child {
      position: relative;
      min-height: 30px;
      padding: 7px 9px;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.36);
      border: 1px solid rgba(255, 255, 255, 0.48);
      color: rgba(16, 24, 40, 0.7);
      font-size: 12px;
      font-weight: 820;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      box-shadow: var(--inner-light);
    }

    .map-child::before {
      content: "";
      position: absolute;
      left: -13px;
      top: 50%;
      width: 12px;
      height: 2px;
      background: rgba(22, 244, 208, 0.42);
    }

    .map-canvas {
      position: relative;
      min-height: min(56dvh, 520px);
      border-radius: 24px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.18)),
        radial-gradient(circle at 50% 50%, rgba(22, 244, 208, 0.16), transparent 34%),
        radial-gradient(circle at 26% 24%, rgba(255, 77, 141, 0.1), transparent 26%),
        radial-gradient(circle at 78% 76%, rgba(0, 168, 255, 0.12), transparent 28%);
      box-shadow: var(--inner-light);
      touch-action: none;
    }

    .map-canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(16, 24, 40, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 24, 40, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      mask: radial-gradient(circle at 50% 50%, #000 0 58%, transparent 88%);
      pointer-events: none;
    }

    .map-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .map-lines path {
      fill: none;
      stroke: rgba(124, 58, 237, 0.32);
      stroke-width: 1.25;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 5 8;
      animation: graphFlow 3.8s linear infinite;
    }

    .map-lines path.active {
      stroke: rgba(255, 77, 141, 0.62);
      stroke-width: 1.75;
      stroke-dasharray: 7 7;
    }

    @keyframes graphFlow {
      to { stroke-dashoffset: -26; }
    }

    .map-node.graph-node {
      position: absolute;
      z-index: 2;
      transform: translate(-50%, -50%);
      max-width: 118px;
      min-height: 34px;
      grid-template-columns: minmax(0, auto);
      justify-content: center;
      cursor: grab;
      touch-action: none;
      padding: 7px 11px;
      animation: nodeFloat 5.5s ease-in-out infinite;
    }

    .map-node.graph-node:nth-of-type(2n) {
      animation-delay: -1.4s;
    }

    .map-node.graph-node:nth-of-type(3n) {
      animation-delay: -2.6s;
    }

    @keyframes nodeFloat {
      0%, 100% { margin-top: 0; }
      50% { margin-top: -4px; }
    }

    .map-node.graph-node b,
    .map-node.graph-node .map-count {
      display: none;
    }

    .map-node.graph-node.active {
      transform: translate(-50%, -50%) scale(1.18);
      max-width: 168px;
      min-height: 46px;
      padding: 10px 16px;
      font-size: 15px;
      z-index: 4;
      animation: none;
    }

    .map-empty {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }

    .card-wrap {
      perspective: 1400px;
      min-height: min(68dvh, 700px);
    }

    .card {
      position: relative;
      width: 100%;
      min-height: min(68dvh, 700px);
      transform-style: preserve-3d;
      transition: transform 0.42s cubic-bezier(0.2, 0.78, 0.24, 1);
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 54px);
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 34px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.42)),
        radial-gradient(circle at 16% 12%, rgba(255, 255, 255, 0.78), transparent 28%),
        radial-gradient(circle at 84% 88%, rgba(255, 77, 141, 0.13), transparent 32%),
        radial-gradient(circle at 18% 86%, rgba(22, 244, 208, 0.16), transparent 30%);
      box-shadow: var(--shadow), var(--inner-light), inset 0 -18px 42px rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(34px) saturate(1.45);
      backface-visibility: hidden;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .face::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent 35%, rgba(255, 255, 255, 0.24));
      mask: linear-gradient(#000, transparent 42%);
    }

    .face.back {
      transform: rotateY(180deg);
      align-items: stretch;
      justify-content: flex-start;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(226, 250, 246, 0.52)),
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.8), transparent 28%),
        radial-gradient(circle at 82% 84%, rgba(124, 58, 237, 0.16), transparent 32%),
        radial-gradient(circle at 20% 88%, rgba(255, 210, 63, 0.2), transparent 30%);
    }

    .card-text {
      width: 100%;
      max-width: 960px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      text-align: center;
      font-size: clamp(26px, 3.6vw, 52px);
      line-height: 1.35;
      font-weight: 760;
      letter-spacing: 0;
      position: relative;
      z-index: 1;
    }

    .answer .card-text {
      max-width: 1080px;
      text-align: left;
      font-size: clamp(18px, 1.9vw, 28px);
      font-weight: 680;
      line-height: 1.58;
    }

    .back-layout {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1080px;
      margin: auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.88fr);
      gap: 16px;
      text-align: left;
    }

    .back-section {
      min-width: 0;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: var(--inner-light);
      backdrop-filter: blur(18px) saturate(1.22);
    }

    .back-section.summary {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(255, 77, 141, 0.14), rgba(22, 244, 208, 0.16), rgba(255, 255, 255, 0.54));
    }

    .back-section.case,
    .back-section.link {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, rgba(255, 210, 63, 0.18), rgba(255, 255, 255, 0.5), rgba(0, 168, 255, 0.12));
    }

    .back-layout.count-1 {
      grid-template-columns: 1fr;
    }

    .back-layout.count-3 .back-section:last-child {
      grid-column: 1 / -1;
    }

    .back-label {
      display: block;
      margin-bottom: 7px;
      color: rgba(16, 24, 40, 0.56);
      font-size: 13px;
      font-weight: 900;
    }

    .back-content {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: rgba(16, 24, 40, 0.88);
      font-size: clamp(17px, 1.65vw, 25px);
      line-height: 1.58;
      font-weight: 680;
    }

    .back-section.summary .back-content {
      font-size: clamp(21px, 2.2vw, 32px);
      line-height: 1.42;
      font-weight: 820;
    }

    .back-section.map .back-content {

  <section class="cover" id="cover" aria-label="液态金属封面">

  <script>
    const STORAGE_KEY = "ipad-memory-cards-v1";
    const TIMER_KEY = "ipad-memory-cards-timer-seconds";
    const MAP_LAYOUT_KEY = "ipad-memory-cards-map-layout-v3";

    const sampleState = {

            {

    let state = loadState();
    let mapLayouts = loadMapLayouts();
    let currentIndex = 0;

    let touchStartY = 0;

    const motivations = [
      "今天也在变强。✨",
      "答不出也没关系，记忆正在长出来。💪",
      "再来一张，脑子会感谢你。⚡",
      "你不是在背题，你是在升级自己。🚀",
      "小步快跑，长期稳赢。🌈",
      "这张卡片拿下，世界亮一点。🌟",
      "保持节奏，答案会越来越熟。🎯"
    ];

    const promptTemplates = {
      deep: `请把资料整理成**可导入卡片程序的高级记忆卡片**。

**严格输出格式：**
具体问题 | 反面内容

**注意：**
- 每张卡片第一行必须包含一个竖线：具体问题 | 一句话答案...
- 「正面」指具体问题，不要真的输出「正面」两个字。
- 「反面」指答案内容，不要真的输出「反面」两个字。
- 反面允许换行。
- 每张卡片之间空一行。
- 不要表格，不要编号，不要解释。

**反面必须包含四块：**
一句话答案：
思维导图：
形象记忆：
真实案例：

**规则：**
1. 每张卡只考一个知识点。

    function renderConceptMap(group) {
      const cards = group.cards || [];
      const current = cards[currentIndex];
      els.mapRoot.textContent = group.name || "卡片组";
      els.mapMeta.textContent = current ? `${cards.length} 张 · 局部关系` : `${cards.length} 张`;
      if (!cards.length) {
        els.conceptMap.innerHTML = `<p class="map-empty">导入卡片后，这里会自动生成整组卡片的连接思维导图。</p>`;
        return;
      }
      const graph = buildMapGraph(group, currentIndex);
      els.conceptMap.innerHTML = `
        <div class="map-canvas" id="mapCanvas">
          <svg class="map-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            ${graph.edges.map((edge) => mapEdgePath(edge, graph.nodes, current.id)).join("")}
          </svg>
          ${graph.nodes.map(mapGraphNode).join("")}
        </div>
      `;
    }

    function buildMapGraph(group, activeIndex) {
      const layout = mapLayouts[group.id] || {};
      const cards = group.cards || [];
      const visibleIndexes = localGraphIndexes(cards, activeIndex);
      const nodes = visibleIndexes.map((index) => {
        const card = cards[index];
        const saved = layout[card.id];
        const position = saved && Number.isFinite(saved.x) && Number.isFinite(saved.y)
          ? saved
          : defaultGraphPosition(index, activeIndex, visibleIndexes);
        return {
          index,
          cardId: card.id,
          active: index === activeIndex,
          label: compactPhrase(card, index === activeIndex ? 7 : 5),
          fullTitle: card.front,
          x: position.x,
          y: position.y
        };
      });
      return { nodes, edges: buildGraphEdges(cards, activeIndex) };
    }

    function mapGraphNode(node) {
      const active = node.active ? " active" : "";
      return `
        <button class="map-node graph-node${active}" type="button" data-map-jump="${node.index}" data-card-id="${escapeHtml(node.cardId)}" title="${escapeHtml(node.fullTitle)}" style="left:${node.x}%; top:${node.y}%;">
          <span>${escapeHtml(node.label)}</span>
        </button>
      `;
    }

    function mapEdgePath(edge, nodes, activeCardId) {
      const from = nodes.find((node) => node.cardId === edge.from);
      const to = nodes.find((node) => node.cardId === edge.to);
      if (!from || !to) return "";
      const dx = Math.abs(from.x - to.x);
      const dy = Math.abs(from.y - to.y);
      const curve = Math.min(18, Math.max(8, (dx + dy) / 5));
      const c1x = from.x + (to.x > from.x ? curve : -curve);
      const c2x = to.x + (to.x > from.x ? -curve : curve);
      const active = from.cardId === activeCardId || to.cardId === activeCardId ? " active" : "";
      return `<path class="${active}" d="M ${from.x} ${from.y} C ${c1x} ${from.y}, ${c2x} ${to.y}, ${to.x} ${to.y}" />`;
    }

    function localGraphIndexes(cards, activeIndex) {
      const indexes = new Set([activeIndex]);
      scoreRelatedCards(cards, activeIndex)
        .slice(0, 5)
        .forEach((item) => indexes.add(item.index));
      if (indexes.size < 6 && activeIndex > 0) indexes.add(activeIndex - 1);
      if (indexes.size < 6 && activeIndex + 1 < cards.length) indexes.add(activeIndex + 1);
      if (indexes.size < 6 && activeIndex > 1) indexes.add(activeIndex - 2);
      if (indexes.size < 6 && activeIndex + 2 < cards.length) indexes.add(activeIndex + 2);
      return [...indexes].sort((a, b) => a - b);
    }

    function defaultGraphPosition(index, activeIndex, visibleIndexes) {
      if (index === activeIndex) return { x: 50, y: 50 };
      const neighbors = visibleIndexes.filter((item) => item !== activeIndex);
      const slot = Math.max(0, neighbors.indexOf(index));
      const positions = [
        { x: 72, y: 32 },
        { x: 75, y: 66 },
        { x: 27, y: 34 },
        { x: 25, y: 66 },
        { x: 50, y: 82 }
      ];
      return positions[slot] || { x: 50, y: 18 };
    }

    function buildGraphEdges(cards, activeIndex) {
      const edges = [];
      if (!cards[activeIndex]) return edges;
      localGraphIndexes(cards, activeIndex).forEach((index) => {
        if (index !== activeIndex) edges.push({ from: cards[activeIndex].id, to: cards[index].id });
      });
      return uniqueEdges(edges);
    }

    function uniqueEdges(edges) {
      const seen = new Set();
      return edges.filter((edge) => {
        const key = [edge.from, edge.to].sort().join("|");
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function compactPhrase(card, limit = 8) {
      const sections = extractBackSections(card.back);
      const source = (sections && sections.map) || (sections && sections.summary) || card.front || "";
      const candidates = String(source)
        .split(/\r?\n|[，。；：:、,.!?？！（）()《》“”"']/)
        .map((item) => item.replace(/[├└│─\-*]/g, " ").replace(/\s+/g, "").trim())
        .filter((item) => item.length >= 2);
      return compactMapLabel(candidates[0] || card.front, limit);
    }

    function loadMapLayouts() {
      try {
        return JSON.parse(localStorage.getItem(MAP_LAYOUT_KEY) || "{}") || {};
      } catch {
        return {};
      }
    }

    function saveMapLayouts() {
      localStorage.setItem(MAP_LAYOUT_KEY, JSON.stringify(mapLayouts));
    }

    function setCardMapPosition(groupId, cardId, x, y) {
      mapLayouts[groupId] = mapLayouts[groupId] || {};
      mapLayouts[groupId][cardId] = {
        x: clampNumber(x, 8, 92),
        y: clampNumber(y, 8, 92)
      };
      saveMapLayouts();
    }

    function clampNumber(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function cardConceptText(card) {
      const sections = extractBackSections(card.back) || {};
      return [card.front, sections.summary, sections.map, sections.image, sections.case].filter(Boolean).join(" ");
    }

    function scoreRelatedCards(cards, currentIndex) {
      const currentTokens = keywordTokens(cardConceptText(cards[currentIndex] || {}));
      return cards
        .map((card, index) => {
          if (index === currentIndex || index === currentIndex - 1 || index === currentIndex + 1) return null;
          const tokens = keywordTokens(cardConceptText(card));
          const shared = [...currentTokens].filter((token) => tokens.has(token)).slice(0, 5);
          return { index, score: shared.length, shared };
        })
        .filter((item) => item && item.score > 0)
        .sort((a, b) => b.score - a.score || Math.abs(a.index - currentIndex) - Math.abs(b.index - currentIndex));
    }

    function keywordTokens(value) {
      const text = String(value || "").toLowerCase();
      const tokens = new Set();
      const stop = new Set(["一个", "一种", "什么", "为什么", "怎么", "如何", "可以", "不是", "就是", "这个", "那个", "需要", "通过", "说明", "答案", "思维", "导图", "真实", "案例"]);
      (text.match(/[a-z0-9]{3,}/g) || []).forEach((token) => tokens.add(token));
      (text.match(/[\u4e00-\u9fff]{2,}/g) || []).forEach((chunk) => {
        if (chunk.length <= 6 && !stop.has(chunk)) tokens.add(chunk);
        for (let i = 0; i < chunk.length - 1; i += 1) {
          const token = chunk.slice(i, i + 2);
          if (!stop.has(token)) tokens.add(token);
        }
      });
      return tokens;
    }

    function compactMapLabel(value, limit = 14) {
      return String(value || "")
        .replace(/^一句话答案[:：]\s*/, "")
        .replace(/[，。；：:、,.!?？！（）()《》“”"']/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, limit) || "未命名";
    }

    function renderCardList(group) {
      els.cardList.innerHTML = "";
      if (!group.cards.length) {
        els.cardList.innerHTML = `<p class="hint">暂无卡片。</p>`;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")

        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    function formatBack(value) {
      const sections = extractBackSections(value);
      if (!sections) {
        return `<div class="back-fallback">${escapeHtml(value)}</div>`;
      }
      const blocks = [
        sections.summary ? backSection("summary", "一句话答案", sections.summary) : "",
        sections.map ? backSection("map", "思维导图", sections.map) : "",
        sections.image ? backSection("image", "形象记忆", sections.image) : "",

    }

    function backSection(kind, label, content) {
      return `
        <section class="back-section ${kind}">
          <span class="back-label">${label}</span>
          <div class="back-content">${escapeHtml(content || "—")}</div>
        </section>
      `;
    }

    function extractBackSections(value) {
      const text = String(value || "").trim();
      const labels = [
        ["summary", ["一句话答案：", "一句话答案:"]],
        ["map", ["思维导图：", "思维导图:"]],
        ["image", ["形象记忆：", "形象记忆:"]],
        ["case", ["真实案例：", "真实案例:", "活学活用：", "活学活用:", "知识链接：", "知识链接:"]]
      ];
      const positions = labels
        .map(([key, aliases]) => {
          const found = aliases
            .map((label) => ({ label, index: text.indexOf(label) }))
            .filter((item) => item.index >= 0)
            .sort((a, b) => a.index - b.index)[0];
          return found ? { key, label: found.label, index: found.index } : { key, label: aliases[0], index: -1 };
        })
        .filter((item) => item.index >= 0)
        .sort((a, b) => a.index - b.index);
      if (positions.length < 2) return null;

      const result = {};
      positions.forEach((item, index) => {
        const start = item.index + item.label.length;
        const end = index + 1 < positions.length ? positions[index + 1].index : text.length;
        result[item.key] = text.slice(start, end).trim();
      });
      return result;
    }

    function flip() {
      if (!activeGroup().cards.length) return;
      if (flipped && timerLocked()) {
        nudgeTimer();
        return;
      }
      flipped = !flipped;
      if (flipped) motivationIndex += 1;
      render();
      if (flipped) {
        startReadingTimer();
      } else {
        stopReadingTimer();
      }
    }

    function move(step) {
      const group = activeGroup();
      if (!group.cards.length) return;
      if (timerLocked()) {
        nudgeTimer();
        return;
      }
      currentIndex = (currentIndex + step + group.cards.length) % group.cards.length;
      flipped = false;
      motivationIndex += 1;
      stopReadingTimer();
      render();
    }

    function smartAdvance() {
      if (!activeGroup().cards.length) return;
      if (!flipped) {
        flip();
      } else if (timerLocked()) {
        nudgeTimer();
      } else {

    function startReadingTimer() {
      clearInterval(timerId);
      if (!timerSeconds || timerSeconds <= 0 || !activeGroup().cards.length) {

      timerRemaining = timerSeconds;
      els.motivation.classList.add("locked");
      updateTimerDisplay();
      timerId = setInterval(() => {
        const elapsed = (Date.now() - timerStartedAt) / 1000;
        timerRemaining = Math.max(0, timerSeconds - elapsed);
        updateTimerDisplay();
        if (timerRemaining <= 0) {
          clearInterval(timerId);
          timerId = 0;
        }
      }, 200);
    }

    function stopReadingTimer() {
      clearInterval(timerId);
      timerId = 0;
      timerRemaining = timerSeconds;
      updateTimerDisplay();
      els.motivation.classList.toggle("locked", flipped && timerSeconds > 0);
    }

    function updateTimerDisplay() {
      if (!els.motivation) return;
      const active = flipped && timerSeconds > 0;
      els.motivation.classList.toggle("locked", active && timerRemaining > 0);
      if (!active) {
        els.timerText.textContent = timerSeconds > 0 ? `阅读 ${timerSeconds}s` : "秒表已关闭";
        els.timerFill.style.width = "100%";

      els.timerText.textContent = timerRemaining > 0 ? `阅读 ${Math.ceil(timerRemaining)}s` : "稳了 ✨";
      els.timerFill.style.width = `${pct}%`;
    }

      return flipped && timerSeconds > 0 && timerRemaining > 0;
    }

    function nudgeTimer() {
      const seconds = Math.max(1, Math.ceil(timerRemaining));
      els.motivationText.textContent = `再看 ${seconds} 秒，把这张吃透 💪`;
      els.motivation.classList.add("locked");
      showToast(`还剩 ${seconds} 秒`);

    function addGroup() {
      const name = els.newGroupName.value.trim() || `卡片组 ${state.groups.length + 1}`;
      const group = { id: uid("g"), name, cards: [] };
      state.groups.push(group);
      state.activeGroupId = group.id;
      els.newGroupName.value = "";
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已新建卡片组");
    }

    function renameGroup() {
      const group = activeGroup();
      const name = prompt("新的卡片组名称", group.name);
      if (!name || !name.trim()) return;
      group.name = name.trim();
      render();
      showToast("已重命名");
    }

    function deleteGroup() {
      if (state.groups.length === 1) {
        showToast("至少保留一个卡片组");
        return;
      }
      const group = activeGroup();
      if (!confirm(`删除「${group.name}」及其中 ${group.cards.length} 张卡片？`)) return;
      state.groups = state.groups.filter((item) => item.id !== group.id);
      state.activeGroupId = state.groups[0].id;
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已删除卡片组");
    }

    function addCard() {
      const front = els.frontInput.value.trim();
      const back = els.backInput.value.trim();
      if (!front || !back) {
        showToast("正面和反面都要填写");
        return;
      }
      activeGroup().cards.push({ id: uid("c"), front, back });
      els.frontInput.value = "";
      els.backInput.value = "";
      currentIndex = activeGroup().cards.length - 1;
      flipped = false;
      render();
      showToast("已添加卡片");
    }

    function parseBulk(text) {
      const trimmed = text.trim();
      if (!trimmed) return [];

      try {
        const data = JSON.parse(trimmed);
        if (Array.isArray(data)) {
          return data
            .map((item) => ({
              front: String(item.front ?? item.q ?? item.question ?? "").trim(),
              back: String(item.back ?? item.a ?? item.answer ?? "").trim()
            }))
            .filter((item) => item.front && item.back);
        }
      } catch {
        // Continue with text formats.
      }

      const blockCards = parseMultilineBlocks(trimmed);
      if (blockCards.length) return uniqueCards(blockCards);

      const cards = parseOrderedLines(trimmed);

      const blocks = trimmed.split(/\n\s*\n/g);
      blocks.forEach((block) => {
        const lines = block.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        const joined = lines.join("\n");
        const qLine = lines.find((line) => /^(Q|问题|正面)\s*[:：]/i.test(line));
        const aLine = lines.find((line) => /^(A|答案|反面)\s*[:：]/i.test(line));
        if (qLine && aLine) {
          cards.push({
            front: qLine.replace(/^(Q|问题|正面)\s*[:：]\s*/i, "").trim(),
            back: aLine.replace(/^(A|答案|反面)\s*[:：]\s*/i, "").trim()
          });
          return;
        }

        if (lines.length === 2 && !splitPair(lines[0]) && !splitPair(lines[1])) {
          cards.push({ front: lines[0], back: lines[1] });
          return;
        }

        const candidateLines = lines.length > 1 ? lines : [joined];
        candidateLines.forEach((line) => {
          const pair = splitPair(line);
          if (pair) cards.push(pair);
        });
      });
      return uniqueCards(cards.filter((card) => card.front && card.back));
    }

    function parseMultilineBlocks(text) {
      return text
        .split(/\n\s*\n/g)
        .map((block) => parseMultilineBlock(block))
        .filter((card) => card && card.front && card.back);
    }

    function parseMultilineBlock(block) {
      const lines = block.split(/\r?\n/).map((line) => line.trimEnd()).filter((line) => line.trim());
      if (!lines.length) return null;
      const firstPair = splitPair(lines[0]);
      if (!firstPair) return null;
      return {
        front: firstPair.front.trim(),
        back: [firstPair.back, ...lines.slice(1)].join("\n").trim()
      };
    }

    function parseOrderedLines(text) {
      const cards = [];
      let pendingFront = "";
      text.split(/\r?\n/).forEach((rawLine) => {
        const line = rawLine.trim();
        if (!line) return;
        if (/^(Q|问题|正面)\s*[:：]/i.test(line)) {
          pendingFront = line.replace(/^(Q|问题|正面)\s*[:：]\s*/i, "").trim();
          return;
        }
        if (/^(A|答案|反面)\s*[:：]/i.test(line)) {
          const back = line.replace(/^(A|答案|反面)\s*[:：]\s*/i, "").trim();
          if (pendingFront && back) cards.push({ front: pendingFront, back });
          pendingFront = "";
          return;
        }
        const pair = splitPair(line);
        if (pair) cards.push(pair);
      });
      return cards;
    }

    function uniqueCards(cards) {
      const seen = new Set();
      return cards.filter((card) => {
        const key = `${card.front}\u0000${card.back}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function splitPair(line) {
      const separators = ["\t", " | ", "|", " :: ", "::", " => ", "=>", " - ", " -- "];
      for (const separator of separators) {
        const index = line.indexOf(separator);
        if (index > 0) {
          return {
            front: line.slice(0, index).trim(),
            back: line.slice(index + separator.length).trim()
          };
        }
      }
      return null;
    }

    function importCards() {
      const cards = parseBulk(els.bulkInput.value);
      if (!cards.length) {
        showToast("没有识别到卡片，请检查格式");
        return;
      }
      const group = activeGroup();
      group.cards.push(...cards.map((card) => ({ id: uid("c"), ...card })));
      els.bulkInput.value = "";
      currentIndex = Math.max(group.cards.length - cards.length, 0);
      flipped = false;
      render();
      showToast(`已导入 ${cards.length} 张卡片`);
    }

    async function copyPrompt() {
      const promptText = els.promptEditor.value.trim() || promptTemplates[els.promptMode.value] || promptTemplates.deep;
      await copyText(promptText, "GPT 提示词已复制");
    }

    async function exportDeck() {
      const group = activeGroup();
      const text = group.cards.map((card) => `${card.front} | ${card.back}`).join("\n");
      await copyText(text, "当前组已复制到剪贴板");
    }

    async function copyText(text, successMessage) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(successMessage);
      } catch {
        const helper = document.createElement("textarea");
        helper.value = text;
        helper.setAttribute("readonly", "");
        helper.style.position = "fixed";
        helper.style.left = "-9999px";
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
        showToast(successMessage);
      }
    }

    function clearDeck() {
      const group = activeGroup();
      if (!group.cards.length) return;
      if (!confirm(`清空「${group.name}」里的 ${group.cards.length} 张卡片？`)) return;
      group.cards = [];
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已清空当前组");
    }

    function shuffleCards() {
      const cards = activeGroup().cards;
      for (let i = cards.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已随机排序");
    }

    function resetProgress() {
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已回到第一张");
    }

    function focusStudy() {
      document.querySelector(".study").scrollIntoView({ behavior: "smooth", block: "center" });
      const studyCard = $("studyCard");
      if (studyCard) studyCard.focus({ preventScroll: true });
    }

    function openCover() {
      els.cover.classList.add("show");
      els.startStudy.focus({ preventScroll: true });
    }

    function closeCover(shouldFocusStudy = true) {
      els.cover.classList.remove("show");
      if (shouldFocusStudy) {
        setTimeout(focusStudy, 120);
      }
    }

    function syncPromptTemplate() {
      els.promptEditor.value = promptTemplates[els.promptMode.value] || promptTemplates.deep;
    }

    function isTypingTarget(target) {
      return target && ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
    }

    els.addGroup.addEventListener("click", addGroup);
    els.newGroupName.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addGroup();
    });
    els.renameGroup.addEventListener("click", renameGroup);
    els.deleteGroup.addEventListener("click", deleteGroup);
    els.prevCard.addEventListener("click", () => move(-1));
    els.nextCard.addEventListener("click", () => move(1));
    els.flipCard.addEventListener("click", smartAdvance);
    els.conceptMap.addEventListener("click", (event) => {
      if (suppressMapClick) {
        suppressMapClick = false;
        return;
      }
      const button = event.target.closest("[data-map-jump]");
      if (!button) return;
      if (timerLocked()) {
        nudgeTimer();
        return;
      }
      currentIndex = Number(button.dataset.mapJump) || 0;
      flipped = false;
      motivationIndex += 1;
      stopReadingTimer();
      render();
      focusStudy();
    });
    els.conceptMap.addEventListener("pointerdown", (event) => {
      const node = event.target.closest(".graph-node");
      if (!node || event.button > 0) return;
      const canvas = event.target.closest(".map-canvas");
      if (!canvas) return;
      mapPointerDrag = {
        cardId: node.dataset.cardId,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        node,
        canvas,
        active: false
      };
      if (node.setPointerCapture) node.setPointerCapture(event.pointerId);
    });
    els.conceptMap.addEventListener("pointermove", (event) => {
      if (!mapPointerDrag || mapPointerDrag.pointerId !== event.pointerId) return;
      const dx = event.clientX - mapPointerDrag.startX;
      const dy = event.clientY - mapPointerDrag.startY;
      if (!mapPointerDrag.active && Math.hypot(dx, dy) < 10) return;
      event.preventDefault();
      mapPointerDrag.active = true;
      mapPointerDrag.node.classList.add("dragging");
      const rect = mapPointerDrag.canvas.getBoundingClientRect();
      const x = clampNumber(((event.clientX - rect.left) / rect.width) * 100, 8, 92);
      const y = clampNumber(((event.clientY - rect.top) / rect.height) * 100, 8, 92);
      mapPointerDrag.node.style.left = `${x}%`;
      mapPointerDrag.node.style.top = `${y}%`;
      mapPointerDrag.x = x;
      mapPointerDrag.y = y;
    });
    els.conceptMap.addEventListener("pointerup", (event) => {
      if (!mapPointerDrag || mapPointerDrag.pointerId !== event.pointerId) return;
      const drag = mapPointerDrag;
      mapPointerDrag = null;
      els.conceptMap.querySelectorAll(".dragging").forEach((item) => item.classList.remove("dragging"));
      if (!drag.active) return;
      suppressMapClick = true;
      if (Number.isFinite(drag.x) && Number.isFinite(drag.y)) {
        setCardMapPosition(activeGroup().id, drag.cardId, drag.x, drag.y);
        render();
        showToast("已调整脑图位置");
      }
    });
    els.conceptMap.addEventListener("pointercancel", () => {
      mapPointerDrag = null;
      els.conceptMap.querySelectorAll(".dragging").forEach((item) => item.classList.remove("dragging"));
    });
    els.openGroups.addEventListener("click", () => openDrawer("left"));
    els.openEditor.addEventListener("click", () => openDrawer("right"));
    els.drawerScrim.addEventListener("click", closeDrawers);
    els.shuffleCards.addEventListener("click", shuffleCards);
    els.resetProgress.addEventListener("click", resetProgress);
    els.focusStudy.addEventListener("click", focusStudy);
    els.startStudy.addEventListener("click", () => closeCover(true));
    els.skipCover.addEventListener("click", () => closeCover(false));
    els.addCard.addEventListener("click", addCard);
    els.importCards.addEventListener("click", importCards);
    els.promptMode.addEventListener("change", syncPromptTemplate);
    els.timerSeconds.addEventListener("change", () => setTimerSeconds(els.timerSeconds.value));
    els.timerSeconds.addEventListener("input", () => setTimerSeconds(els.timerSeconds.value));
    els.copyPrompt.addEventListener("click", copyPrompt);
    els.exportDeck.addEventListener("click", exportDeck);
    els.clearDeck.addEventListener("click", clearDeck);

    document.addEventListener("click", (event) => {
      if (!document.body.classList.contains("drawer-left") && !document.body.classList.contains("drawer-right")) return;
      if (event.target.closest(".sidebar, .panel, #openGroups, #openEditor")) return;
      closeDrawers();
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
        document.querySelectorAll(".pane").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
        $(`pane-${tab.dataset.tab}`).classList.add("active");
      });
    });

    els.cardList.addEventListener("click", (event) => {
      const jump = event.target.closest("[data-jump]");
      const del = event.target.closest("[data-delete]");
      if (jump) {
        currentIndex = Number(jump.dataset.jump);
        flipped = false;
        closeDrawers();
        render();
        focusStudy();
      }
      if (del) {
        const group = activeGroup();
        group.cards = group.cards.filter((card) => card.id !== del.dataset.delete);
        clampIndex();
        flipped = false;
        render();
        showToast("已删除卡片");
      }
    });

    document.addEventListener("keydown", (event) => {
      if (isTypingTarget(event.target)) return;
      if (els.cover.classList.contains("show")) {
        if (event.key === "Escape" || event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          closeCover(true);
        }
        return;
      }
      if (event.key === " ") {
        event.preventDefault();
        smartAdvance();
      } else if (event.key === "ArrowRight") {
        move(1);
      } else if (event.key === "ArrowLeft") {
        move(-1);
      } else if (event.key === "Escape") {
        closeDrawers();
      } else if (event.key.toLowerCase() === "r") {
        resetProgress();
      }
    });

    document.addEventListener("touchstart", (event) => {
      if (!event.touches.length || isTypingTarget(event.target)) return;
      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    document.addEventListener("touchend", (event) => {
      if (!event.changedTouches.length || isTypingTarget(event.target)) return;
      const dx = event.changedTouches[0].clientX - touchStartX;
      const dy = event.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy) * 1.25) return;
      if (dx > 0 && touchStartX < 80) {
        openDrawer("left");
      } else if (dx < 0 && touchStartX > window.innerWidth - 80) {
        openDrawer("right");
      } else if (document.body.classList.contains("drawer-left") && dx < -70) {
        closeDrawers();
      } else if (document.body.classList.contains("drawer-right") && dx > 70) {
        closeDrawers();
      }
    }, { passive: true });

    render();
    syncPromptTemplate();
    setTimerSeconds(timerSeconds);
    openCover();
  </script>
</body>
</html>
