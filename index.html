        .filter((item) => item && item.score > 0)
        .sort((a, b) => b.score - a.score || Math.abs(a.index - currentIndex) - Math.abs(b.index - currentIndex));
    }

    function keywordTokens(value) {
      const text = String(value || "").toLowerCase();
      const tokens = new Set();
      const stop = new Set(["一个", "一种", "什么", "为什么", "怎么", "如何", "可以", "不是", "就是", "这个", "那个", "需要", "通过", "说明", "答案", "思维", "导图", "真实", "案例"]);
      (text.match(/[a-z0-9]{3,}/g) || []).forEach((token) => tokens.add(token));
      (text.match(/[\u4e00-\u9fff]{2,}/g) || []).forEach((chunk) => {
        if (chunk.length <= 6 && !stop.has(chunk)) tokens.add(chunk);
        for (let i = 0; i < chunk.length - 1; i += 1) {
          const token = chunk.slice(i, i + 2);
          if (!stop.has(token)) tokens.add(token);
        }
      });
      return tokens;
    }

    function compactMapLabel(value, limit = 14) {
      return String(value || "")
        .replace(/^一句话答案[:：]\s*/, "")
        .replace(/[，。；：:、,.!?？！（）()《》“”"']/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, limit) || "未命名";
    }

    function renderCardList(group) {
      els.cardList.innerHTML = "";
      if (!group.cards.length) {
        els.cardList.innerHTML = `<p class="hint">暂无卡片。</p>`;
        return;
      }
      group.cards.forEach((card, index) => {
        const item = document.createElement("div");
        item.className = "mini-card";
        item.innerHTML = `
          <div>
            <strong>${escapeHtml(card.front)}</strong>
            <em class="chapter-badge">${escapeHtml(cardChapter(card))}</em>
            <span>${escapeHtml(card.back)}</span>
          </div>
          <div class="mini-actions">
            <button type="button" title="学习这张" aria-label="学习这张" data-jump="${index}">↗</button>
            <button type="button" title="删除" aria-label="删除" data-delete="${card.id}">×</button>
          </div>
        `;
        els.cardList.appendChild(item);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatBack(value) {
      const sections = extractBackSections(value);
      if (!sections) {
        return `<div class="back-fallback">${escapeHtml(value)}</div>`;
      }
      const blocks = [
        sections.summary ? backSection("summary", "一句话答案", sections.summary) : "",
        sections.map ? backSection("map", "思维导图", sections.map) : "",
        sections.image ? backSection("image", "形象记忆", sections.image) : "",
        sections.case ? backSection("case", "真实案例", sections.case) : ""
      ].filter(Boolean);
      return `
        <div class="back-layout count-${blocks.length}">
          ${blocks.join("")}
        </div>
      `;
    }

    function backSection(kind, label, content) {
      return `
        <section class="back-section ${kind}">
          <span class="back-label">${label}</span>
          <div class="back-content">${escapeHtml(content || "—")}</div>
        </section>
      `;
    }

    function extractBackSections(value) {
      const text = String(value || "").trim();
      const labels = [
        ["summary", ["一句话答案：", "一句话答案:"]],
        ["map", ["思维导图：", "思维导图:"]],
        ["image", ["形象记忆：", "形象记忆:"]],
        ["case", ["真实案例：", "真实案例:", "活学活用：", "活学活用:", "知识链接：", "知识链接:"]]
      ];
      const positions = labels
        .map(([key, aliases]) => {
          const found = aliases
            .map((label) => ({ label, index: text.indexOf(label) }))
            .filter((item) => item.index >= 0)
            .sort((a, b) => a.index - b.index)[0];
          return found ? { key, label: found.label, index: found.index } : { key, label: aliases[0], index: -1 };
        })
        .filter((item) => item.index >= 0)
        .sort((a, b) => a.index - b.index);
      if (positions.length < 2) return null;

      const result = {};
      positions.forEach((item, index) => {
        const start = item.index + item.label.length;
        const end = index + 1 < positions.length ? positions[index + 1].index : text.length;
        result[item.key] = text.slice(start, end).trim();
      });
      return result;
    }

    function flip() {
      if (!activeGroup().cards.length) return;
      if (flipped && timerLocked()) {
        nudgeTimer();
        return;
      }
      flipped = !flipped;
      if (flipped) motivationIndex += 1;
      render();
      if (flipped) {
        startReadingTimer();
      } else {
        stopReadingTimer();
      }
    }

    function move(step) {
      const group = activeGroup();
      const indexes = studyIndexes(group);
      if (!indexes.length) return;
      if (timerLocked()) {
        nudgeTimer();
        return;
      }
      const currentLocal = Math.max(0, indexes.indexOf(currentIndex));
      currentIndex = indexes[(currentLocal + step + indexes.length) % indexes.length];
      flipped = false;
      motivationIndex += 1;
      stopReadingTimer();
      render();
    }

    function smartAdvance() {
      if (!activeGroup().cards.length) return;
      if (!flipped) {
        flip();
      } else if (timerLocked()) {
        nudgeTimer();
      } else {
        move(1);
      }
    }

    function openDrawer(side) {
      document.body.classList.toggle("drawer-left", side === "left");
      document.body.classList.toggle("drawer-right", side === "right");
    }

    function closeDrawers() {
      document.body.classList.remove("drawer-left", "drawer-right");
    }

    function setTimerSeconds(value) {
      const next = Math.max(0, Math.min(60, Number(value) || 0));
      timerSeconds = next;
      timerRemaining = next;
      localStorage.setItem(TIMER_KEY, String(next));
      els.timerSeconds.value = String(next);
      if (flipped && next > 0) {
        startReadingTimer();
      } else {
        stopReadingTimer();
      }
    }

    function startReadingTimer() {
      clearInterval(timerId);
      if (!timerSeconds || timerSeconds <= 0 || !activeGroup().cards.length) {
        stopReadingTimer();
        return;
      }
      timerStartedAt = Date.now();
      timerRemaining = timerSeconds;
      els.motivation.classList.add("locked");
      updateTimerDisplay();
      timerId = setInterval(() => {
        const elapsed = (Date.now() - timerStartedAt) / 1000;
        timerRemaining = Math.max(0, timerSeconds - elapsed);
        updateTimerDisplay();
        if (timerRemaining <= 0) {
          clearInterval(timerId);
          timerId = 0;
        }
      }, 200);
    }

    function stopReadingTimer() {
      clearInterval(timerId);
      timerId = 0;
      timerRemaining = timerSeconds;
      updateTimerDisplay();
      els.motivation.classList.toggle("locked", flipped && timerSeconds > 0);
    }

    function updateTimerDisplay() {
      if (!els.motivation) return;
      const active = flipped && timerSeconds > 0;
      els.motivation.classList.toggle("locked", active && timerRemaining > 0);
      if (!active) {
        els.timerText.textContent = timerSeconds > 0 ? `阅读 ${timerSeconds}s` : "秒表已关闭";
        els.timerFill.style.width = "100%";
        return;
      }
      const pct = timerSeconds ? Math.max(0, Math.min(100, (timerRemaining / timerSeconds) * 100)) : 0;
      els.timerText.textContent = timerRemaining > 0 ? `阅读 ${Math.ceil(timerRemaining)}s` : "稳了 ✨";
      els.timerFill.style.width = `${pct}%`;
    }

    function timerLocked() {
      return flipped && timerSeconds > 0 && timerRemaining > 0;
    }

    function nudgeTimer() {
      const seconds = Math.max(1, Math.ceil(timerRemaining));
      els.motivationText.textContent = `再看 ${seconds} 秒，把这张吃透 💪`;
      els.motivation.classList.add("locked");
      showToast(`还剩 ${seconds} 秒`);
    }

    function addGroup() {
      const name = els.newGroupName.value.trim() || `卡片组 ${state.groups.length + 1}`;
      const group = { id: uid("g"), name, activeChapter: "__chapters", cards: [] };
      state.groups.push(group);
      state.activeGroupId = group.id;
      els.newGroupName.value = "";
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已新建卡片组");
    }

    function renameGroup() {
      const group = activeGroup();
      const name = prompt("新的卡片组名称", group.name);
      if (!name || !name.trim()) return;
      group.name = name.trim();
      render();
      showToast("已重命名");
    }

    function deleteGroup() {
      if (state.groups.length === 1) {
        showToast("至少保留一个卡片组");
        return;
      }
      const group = activeGroup();
      if (!confirm(`删除「${group.name}」及其中 ${group.cards.length} 张卡片？`)) return;
      state.groups = state.groups.filter((item) => item.id !== group.id);
      state.activeGroupId = state.groups[0].id;
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已删除卡片组");
    }

    function addCard() {
      const front = els.frontInput.value.trim();
      const back = els.backInput.value.trim();
      const selectedChapter = activeChapter(activeGroup());
      const chapter = (els.chapterInput && els.chapterInput.value.trim()) || (selectedChapter === "__all" || selectedChapter === "__chapters" ? "默认章节" : selectedChapter);
      if (!front || !back) {
        showToast("正面和反面都要填写");
        return;
      }
      activeGroup().cards.push({ id: uid("c"), front, back, chapter });
      els.frontInput.value = "";
      els.backInput.value = "";
      currentIndex = activeGroup().cards.length - 1;
      flipped = false;
      render();
      showToast("已添加卡片");
    }

    function parseBulk(text) {
      const trimmed = text.trim();
      if (!trimmed) return [];

      try {
        const data = JSON.parse(trimmed);
        if (Array.isArray(data)) {
          return data
            .map((item) => ({
              front: String(item.front ?? item.q ?? item.question ?? "").trim(),
              back: String(item.back ?? item.a ?? item.answer ?? "").trim(),
              chapter: String(item.chapter ?? item.section ?? item.part ?? "默认章节").trim() || "默认章节",
              links: Array.isArray(item.links) ? uniqueList(item.links).slice(0, 8) : []
            }))
            .filter((item) => item.front && item.back);
        }
      } catch {
        // Continue with text formats.
      }

      const chapterCards = parseChapteredText(trimmed);
      if (chapterCards.length) return uniqueCards(chapterCards);

      const blockCards = parseMultilineBlocks(trimmed);
      if (blockCards.length) return uniqueCards(blockCards);

      const cards = parseOrderedLines(trimmed);

      const blocks = trimmed.split(/\n\s*\n/g);
      blocks.forEach((block) => {
        const lines = block.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
        const joined = lines.join("\n");
        const qLine = lines.find((line) => /^(Q|问题|正面)\s*[:：]/i.test(line));
        const aLine = lines.find((line) => /^(A|答案|反面)\s*[:：]/i.test(line));
        if (qLine && aLine) {
          cards.push({
            front: qLine.replace(/^(Q|问题|正面)\s*[:：]\s*/i, "").trim(),
            back: aLine.replace(/^(A|答案|反面)\s*[:：]\s*/i, "").trim()
          });
          return;
        }

        if (lines.length === 2 && !splitPair(lines[0]) && !splitPair(lines[1])) {
          cards.push({ front: lines[0], back: lines[1] });
          return;
        }

        const candidateLines = lines.length > 1 ? lines : [joined];
        candidateLines.forEach((line) => {
          const pair = splitPair(line);
          if (pair) cards.push(pair);
        });
      });
      return uniqueCards(cards.filter((card) => card.front && card.back));
    }

    function parseChapteredText(text) {
      const sections = [];
      let currentChapter = "默认章节";
      let buffer = [];
      let sawChapter = false;
      text.split(/\r?\n/).forEach((line) => {
        const chapter = chapterHeading(line);
        if (chapter) {
          if (buffer.join("\n").trim()) sections.push({ chapter: currentChapter, text: buffer.join("\n") });
          currentChapter = chapter;
          buffer = [];
          sawChapter = true;
          return;
        }
        buffer.push(line);
      });
      if (buffer.join("\n").trim()) sections.push({ chapter: currentChapter, text: buffer.join("\n") });
      if (!sawChapter) return [];
      return sections.flatMap((section) => parseBulk(section.text).map((card) => ({ ...card, chapter: section.chapter })));
    }

    function chapterHeading(line) {
      const text = String(line || "").trim();
      if (!text) return "";
      const patterns = [
        /^#{1,6}\s+(.+)$/,
        /^【(.{1,28})】$/,
        /^第[一二三四五六七八九十百\d]+[章节讲课部分]\s*[：:、-]?\s*(.*)$/,
        /^(章节|章|Chapter|Section)\s*[:：]\s*(.+)$/i
      ];
      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (!match) continue;
        const name = (match[2] || match[1] || text).trim();
        return name || text;
      }
      return "";
    }

    function selectedImportChapter() {
      if (!els.importChapterSelect) return "";
      const value = els.importChapterSelect.value;
      if (value === "__auto") return "";
      if (value === "__new") return (els.importChapterName && els.importChapterName.value.trim()) || "新章节";
      return value;
    }

    function parseMultilineBlocks(text) {
      return text
        .split(/\n\s*\n/g)
        .map((block) => parseMultilineBlock(block))
        .filter((card) => card && card.front && card.back);
    }

    function parseMultilineBlock(block) {
      const lines = block.split(/\r?\n/).map((line) => line.trimEnd()).filter((line) => line.trim());
      if (!lines.length) return null;
      const firstPair = splitPair(lines[0]);
      if (!firstPair) return null;
      return {
        front: firstPair.front.trim(),
        back: [firstPair.back, ...lines.slice(1)].join("\n").trim()
      };
    }

    function parseOrderedLines(text) {
      const cards = [];
      let pendingFront = "";
      text.split(/\r?\n/).forEach((rawLine) => {
        const line = rawLine.trim();
        if (!line) return;
        if (/^(Q|问题|正面)\s*[:：]/i.test(line)) {
          pendingFront = line.replace(/^(Q|问题|正面)\s*[:：]\s*/i, "").trim();
          return;
        }
        if (/^(A|答案|反面)\s*[:：]/i.test(line)) {
          const back = line.replace(/^(A|答案|反面)\s*[:：]\s*/i, "").trim();
          if (pendingFront && back) cards.push({ front: pendingFront, back });
          pendingFront = "";
          return;
        }
        const pair = splitPair(line);
        if (pair) cards.push(pair);
      });
      return cards;
    }

    function uniqueCards(cards) {
      const seen = new Set();
      return cards.filter((card) => {
        const key = `${card.front}\u0000${card.back}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function splitPair(line) {
      const separators = ["\t", " | ", "|", " :: ", "::", " => ", "=>", " - ", " -- "];
      for (const separator of separators) {
        const index = line.indexOf(separator);
        if (index > 0) {
          return {
            front: line.slice(0, index).trim(),
            back: line.slice(index + separator.length).trim()
          };
        }
      }
      return null;
    }

    function importCards() {
      const importChapter = selectedImportChapter();
      const cards = parseBulk(els.bulkInput.value);
      if (!cards.length) {
        showToast("没有识别到卡片，请检查格式");
        return;
      }
      const group = activeGroup();
      const selectedChapter = activeChapter(group);
      const fallbackChapter = importChapter || (selectedChapter === "__all" || selectedChapter === "__chapters" ? "默认章节" : selectedChapter);
      group.cards.push(...cards.map((card) => ({ id: uid("c"), chapter: card.chapter || fallbackChapter, ...card })));
      if (importChapter) group.activeChapter = importChapter;
      els.bulkInput.value = "";
      currentIndex = Math.max(group.cards.length - cards.length, 0);
      flipped = false;
      render();
      showToast(`已导入 ${cards.length} 张卡片`);
    }

    async function copyPrompt() {
      const promptText = els.promptEditor.value.trim() || promptTemplates[els.promptMode.value] || promptTemplates.deep;
      await copyText(promptText, "GPT 提示词已复制");
    }

    async function exportDeck() {
      const group = activeGroup();
      const text = group.cards.map((card) => `${card.front} | ${card.back}`).join("\n");
      await copyText(text, "当前组已复制到剪贴板");
    }

    async function copyText(text, successMessage) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(successMessage);
      } catch {
        const helper = document.createElement("textarea");
        helper.value = text;
        helper.setAttribute("readonly", "");
        helper.style.position = "fixed";
        helper.style.left = "-9999px";
        document.body.appendChild(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
        showToast(successMessage);
      }
    }

    function clearDeck() {
      const group = activeGroup();
      if (!group.cards.length) return;
      if (!confirm(`清空「${group.name}」里的 ${group.cards.length} 张卡片？`)) return;
      group.cards = [];
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已清空当前组");
    }

    function shuffleCards() {
      const cards = activeGroup().cards;
      for (let i = cards.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已随机排序");
    }

    function resetProgress() {
      currentIndex = 0;
      flipped = false;
      render();
      showToast("已回到第一张");
    }

    function focusStudy() {
      document.querySelector(".study").scrollIntoView({ behavior: "smooth", block: "center" });
      const studyCard = $("studyCard");
      if (studyCard) studyCard.focus({ preventScroll: true });
    }

    function openCover() {
      els.cover.classList.add("show");
      els.startStudy.focus({ preventScroll: true });
    }

    function closeCover(shouldFocusStudy = true) {
      els.cover.classList.remove("show");
      if (shouldFocusStudy) {
        setTimeout(focusStudy, 120);
      }
    }

    function syncPromptTemplate() {
      els.promptEditor.value = promptTemplates[els.promptMode.value] || promptTemplates.deep;
    }

    function isTypingTarget(target) {
      return target && ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
    }

    els.addGroup.addEventListener("click", addGroup);
    els.newGroupName.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addGroup();
    });
    els.renameGroup.addEventListener("click", renameGroup);
    els.deleteGroup.addEventListener("click", deleteGroup);
    els.prevCard.addEventListener("click", () => move(-1));
    els.nextCard.addEventListener("click", () => move(1));
    els.flipCard.addEventListener("click", smartAdvance);
    els.conceptMap.addEventListener("click", (event) => {
      if (suppressMapClick) {
        suppressMapClick = false;
        return;
      }
      const button = event.target.closest("[data-map-jump]");
      if (!button) return;
      if (timerLocked()) {
        nudgeTimer();
        return;
      }
      currentIndex = Number(button.dataset.mapJump) || 0;
      flipped = false;
      motivationIndex += 1;
      stopReadingTimer();
      render();
      focusStudy();
    });
    els.conceptMap.addEventListener("pointerdown", (event) => {
      const canvas = event.target.closest(".map-canvas");
      if (!canvas || event.button > 0) return;
      const node = event.target.closest(".graph-node");
      mapPointerDrag = {
        cardId: node ? node.dataset.cardId : "",
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        node,
        canvas,
        whole: !node,
        nodes: [...canvas.querySelectorAll(".graph-node")].map((item) => ({
          element: item,
          cardId: item.dataset.cardId,
          x: parseFloat(item.style.left),
          y: parseFloat(item.style.top),
          primary: item === node
        })),
        dots: [...canvas.querySelectorAll(".graph-dot")].map((item) => ({
          element: item,
          x: parseFloat(item.style.left),
          y: parseFloat(item.style.top)
        })),
        active: false
      };
      if (canvas.setPointerCapture) canvas.setPointerCapture(event.pointerId);
    });
    els.conceptMap.addEventListener("pointermove", (event) => {
      if (!mapPointerDrag || mapPointerDrag.pointerId !== event.pointerId) return;
      const dx = event.clientX - mapPointerDrag.startX;
      const dy = event.clientY - mapPointerDrag.startY;
      if (!mapPointerDrag.active && Math.hypot(dx, dy) < 10) return;
      event.preventDefault();
      mapPointerDrag.active = true;
      if (mapPointerDrag.node) mapPointerDrag.node.classList.add("dragging");
      const rect = mapPointerDrag.canvas.getBoundingClientRect();
      const dxPct = (dx / rect.width) * 100;
      const dyPct = (dy / rect.height) * 100;
      mapPointerDrag.nodes.forEach((item) => {
        const strength = mapPointerDrag.whole ? 1 : (item.primary ? 1 : 0.38);
        const x = clampNumber(item.x + dxPct * strength, 8, 92);
        const y = clampNumber(item.y + dyPct * strength, 8, 92);
        item.element.style.left = `${x}%`;
        item.element.style.top = `${y}%`;
        item.nextX = x;
        item.nextY = y;
      });
      mapPointerDrag.dots.forEach((item) => {
        const strength = mapPointerDrag.whole ? 0.72 : 0.18;
        item.element.style.left = `${clampNumber(item.x + dxPct * strength, 4, 96)}%`;
        item.element.style.top = `${clampNumber(item.y + dyPct * strength, 4, 96)}%`;
      });
    });
    els.conceptMap.addEventListener("pointerup", (event) => {
      if (!mapPointerDrag || mapPointerDrag.pointerId !== event.pointerId) return;
      const drag = mapPointerDrag;
      mapPointerDrag = null;
      els.conceptMap.querySelectorAll(".dragging").forEach((item) => item.classList.remove("dragging"));
      if (!drag.active) return;
      suppressMapClick = true;
      drag.nodes.forEach((item) => {
        if (Number.isFinite(item.nextX) && Number.isFinite(item.nextY)) {
          setCardMapPosition(activeGroup().id, item.cardId, item.nextX, item.nextY);
        }
      });
      render();
      showToast("已调整图谱位置");
    });
    els.conceptMap.addEventListener("pointercancel", () => {
      mapPointerDrag = null;
      els.conceptMap.querySelectorAll(".dragging").forEach((item) => item.classList.remove("dragging"));
    });
    if (els.mapResizer) {
      els.mapResizer.addEventListener("pointerdown", (event) => {
        mapResizeDrag = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startWidth: mapWidth
        };
        event.preventDefault();
        if (els.mapResizer.setPointerCapture) els.mapResizer.setPointerCapture(event.pointerId);
      });
    }
    document.addEventListener("pointermove", (event) => {
      if (!mapResizeDrag || mapResizeDrag.pointerId !== event.pointerId) return;
      event.preventDefault();
      mapWidth = clampNumber(mapResizeDrag.startWidth + event.clientX - mapResizeDrag.startX, 280, 520);
      applyMapWidth();
    });
    document.addEventListener("pointerup", (event) => {
      if (!mapResizeDrag || mapResizeDrag.pointerId !== event.pointerId) return;
      mapResizeDrag = null;
      localStorage.setItem(MAP_WIDTH_KEY, String(Math.round(mapWidth)));
      showToast("已调整图谱宽度");
    });
    els.openGroups.addEventListener("click", () => openDrawer("left"));
    els.openEditor.addEventListener("click", () => openDrawer("right"));
    els.drawerScrim.addEventListener("click", closeDrawers);
    els.shuffleCards.addEventListener("click", shuffleCards);
    els.resetProgress.addEventListener("click", resetProgress);
    els.focusStudy.addEventListener("click", focusStudy);
    els.startStudy.addEventListener("click", () => closeCover(true));
    els.skipCover.addEventListener("click", () => closeCover(false));
    els.addCard.addEventListener("click", addCard);
    els.importCards.addEventListener("click", importCards);
    els.promptMode.addEventListener("change", syncPromptTemplate);
    if (els.importChapterSelect) {
      els.importChapterSelect.addEventListener("change", () => {
        if (els.importChapterName) els.importChapterName.style.display = els.importChapterSelect.value === "__new" ? "block" : "none";
      });
    }
    if (els.chapterSelect) {
      els.chapterSelect.addEventListener("change", () => {
        const group = activeGroup();
        group.activeChapter = els.chapterSelect.value;
        currentIndex = studyIndexes(group)[0] || 0;
        flipped = false;
        stopReadingTimer();
        render();
      });
    }
    els.timerSeconds.addEventListener("change", () => setTimerSeconds(els.timerSeconds.value));
    els.timerSeconds.addEventListener("input", () => setTimerSeconds(els.timerSeconds.value));
    els.copyPrompt.addEventListener("click", copyPrompt);
    els.exportDeck.addEventListener("click", exportDeck);
    els.clearDeck.addEventListener("click", clearDeck);

    document.addEventListener("click", (event) => {
      if (!document.body.classList.contains("drawer-left") && !document.body.classList.contains("drawer-right")) return;
      if (event.target.closest(".sidebar, .panel, #openGroups, #openEditor")) return;
      closeDrawers();
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
        document.querySelectorAll(".pane").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
        $(`pane-${tab.dataset.tab}`).classList.add("active");
      });
    });

    els.cardList.addEventListener("click", (event) => {
      const jump = event.target.closest("[data-jump]");
      const del = event.target.closest("[data-delete]");
      if (jump) {
        currentIndex = Number(jump.dataset.jump);
        flipped = false;
        closeDrawers();
        render();
        focusStudy();
      }
      if (del) {
        const group = activeGroup();
        group.cards = group.cards.filter((card) => card.id !== del.dataset.delete);
        clampIndex();
        flipped = false;
        render();
        showToast("已删除卡片");
      }
    });

    document.addEventListener("keydown", (event) => {
      if (isTypingTarget(event.target)) return;
      if (els.cover.classList.contains("show")) {
        if (event.key === "Escape" || event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          closeCover(true);
        }
        return;
      }
      if (event.key === " ") {
        event.preventDefault();
        smartAdvance();
      } else if (event.key === "ArrowRight") {
        move(1);
      } else if (event.key === "ArrowLeft") {
        move(-1);
      } else if (event.key === "Escape") {
        closeDrawers();
      } else if (event.key.toLowerCase() === "r") {
        resetProgress();
      }
    });

    document.addEventListener("touchstart", (event) => {
      if (!event.touches.length || isTypingTarget(event.target)) return;
      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    document.addEventListener("touchend", (event) => {
      if (!event.changedTouches.length || isTypingTarget(event.target)) return;
      const dx = event.changedTouches[0].clientX - touchStartX;
      const dy = event.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy) * 1.25) return;
      if (dx > 0 && touchStartX < 80) {
        openDrawer("left");
      } else if (dx < 0 && touchStartX > window.innerWidth - 80) {
        openDrawer("right");
      } else if (document.body.classList.contains("drawer-left") && dx < -70) {
        closeDrawers();
      } else if (document.body.classList.contains("drawer-right") && dx > 70) {
        closeDrawers();
      }
    }, { passive: true });

    render();
    syncPromptTemplate();
    applyMapWidth();
    setTimerSeconds(timerSeconds);
    openCover();
  </script>
</body>
</html>
